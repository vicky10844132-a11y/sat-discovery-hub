<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GS LinkOps AI — English Platform</title>
<style>
:root{--bg:#06101d;--panel:#0d1b31;--panel2:#10243d;--line:#2b4664;--text:#edf7ff;--muted:#9eb6cf;--cyan:#44ddff;--green:#7cf0b2;--amber:#ffd166;--red:#ff6b78;--blue:#6fb6ff;--purple:#bca7ff}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 10% 0,#143a65 0,#06101d 44%,#040913 100%);color:var(--text);font-family:Inter,Arial,sans-serif}button,input,select,textarea{font:inherit}.shell{display:grid;grid-template-columns:292px 1fr;min-height:100vh}.side{height:100vh;position:sticky;top:0;overflow:auto;background:#071426;border-right:1px solid var(--line);padding:22px}.brand{display:flex;gap:12px;align-items:center;margin-bottom:18px}.logo{width:46px;height:46px;border-radius:15px;background:linear-gradient(135deg,var(--cyan),var(--green));display:grid;place-items:center;color:#06101c;font-weight:1000;box-shadow:0 0 28px #44ddff55}.brand b{font-size:18px}.brand span{display:block;color:var(--muted);font-size:12px;margin-top:3px}.tag{display:inline-flex;border:1px solid #315072;background:#0b1d33;color:#b8d5ef;border-radius:999px;padding:6px 9px;font-size:11px;font-weight:900}.nav{margin-top:16px}.nav button{width:100%;text-align:left;border:1px solid transparent;background:transparent;color:#cfe3f8;border-radius:14px;padding:10px 12px;margin:3px 0;cursor:pointer;font-weight:800}.nav button:hover,.nav button.active{border-color:#315072;background:#132844;color:#fff}.main{padding:24px 28px 40px;max-width:1600px;width:100%;margin:0 auto}.topbar{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:20px}.title h1{margin:0;font-size:30px}.title p{margin:7px 0 0;color:var(--muted);line-height:1.45}.actions{display:flex;gap:10px;flex-wrap:wrap}.btn{border:1px solid #315072;background:#132844;color:#e9f6ff;border-radius:12px;padding:9px 12px;cursor:pointer;font-weight:900}.btn.primary{background:linear-gradient(135deg,var(--cyan),var(--green));color:#06101c;border:0}.btn.danger{border-color:#8c3440;color:#ffd6da}.grid{display:grid;gap:16px}.cards{grid-template-columns:repeat(4,minmax(0,1fr))}.two{grid-template-columns:1.08fr .92fr}.three{grid-template-columns:repeat(3,1fr)}.section,.card{border:1px solid var(--line);background:linear-gradient(180deg,#10213a,#0a172b);border-radius:22px;padding:18px;box-shadow:0 18px 40px #0005}.section h2{font-size:20px;margin:0 0 12px}.section h3{font-size:15px;margin:12px 0 10px}.card small{color:var(--muted);line-height:1.4}.num{font-size:34px;font-weight:1000;margin:5px 0}.muted{color:var(--muted)}.pill{display:inline-block;border-radius:999px;padding:5px 8px;font-size:11px;font-weight:1000;border:1px solid}.ok{color:#caffdf;background:#0d3026;border-color:#2b8b61}.pending{color:#ffe8a8;background:#2f260f;border-color:#8c6e22}.info{color:#cce9ff;background:#102b4b;border-color:#3471aa}.bad{color:#ffd6da;background:#33141b;border-color:#8c3440}.purple{color:#ebddff;background:#261c44;border-color:#6952a8}.table{width:100%;border-collapse:separate;border-spacing:0 8px}.table th{font-size:12px;text-align:left;color:#8faac5;padding:0 10px}.table td{background:#0f223b;border-top:1px solid #294765;border-bottom:1px solid #294765;padding:11px 10px;font-size:13px;vertical-align:top}.table td:first-child{border-left:1px solid #294765;border-radius:13px 0 0 13px}.table td:last-child{border-right:1px solid #294765;border-radius:0 13px 13px 0}.empty{border:1px dashed #45627e;background:#0b1b31;border-radius:18px;padding:18px;color:#c7d8e8;line-height:1.55}.fieldgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.field{display:grid;gap:5px}.field label{font-size:12px;color:#9fb4cb;font-weight:900}.field input,.field select,.field textarea{background:#08182d;border:1px solid #315072;color:#fff;border-radius:12px;padding:9px;min-width:0}.field textarea{min-height:76px}.alert{border:1px solid #315072;background:#0e2038;border-radius:16px;padding:12px;line-height:1.45;font-size:13px;margin-bottom:10px}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}.hidden{display:none!important}.footer{margin-top:18px;color:#7892ad;font-size:12px;line-height:1.45}.copilot{background:linear-gradient(135deg,#132844,#101936 55%,#0b1a2e);border-color:#45679a}.workflow{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.step{border:1px solid #315072;background:#0b1d33;border-radius:16px;padding:11px;min-height:76px}.step b{font-size:12px}.step span{display:block;color:#9fb4cb;font-size:11px;margin-top:7px}.searchbar{display:flex;gap:10px;margin-bottom:12px}.searchbar input{flex:1;background:#08182d;border:1px solid #315072;color:#fff;border-radius:12px;padding:10px}@media(max-width:1180px){.shell{grid-template-columns:1fr}.side{position:relative;height:auto}.cards,.two,.three,.fieldgrid,.workflow{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="shell">
  <aside class="side">
    <div class="brand"><div class="logo">GS</div><div><b>GS LinkOps AI</b><span>English platform version</span></div></div>
    <div class="tag">database-first · dispatch intelligence</div>
    <nav class="nav" id="nav"></nav>
    <p class="footer">This English version focuses on the database-building phase: source evidence, satellite intelligence, ground-station compatibility, system adapters, matching logic, mission cases, commercial rules, and governance.</p>
  </aside>
  <main class="main">
    <div class="topbar">
      <div class="title"><h1 id="pageTitle"></h1><p id="pageDesc"></p></div>
      <div class="actions">
        <button class="btn" onclick="exportData()">Export JSON</button>
        <button class="btn" onclick="document.getElementById('importFile').click()">Import JSON</button>
        <button class="btn danger" onclick="resetAll()">Reset</button>
        <input id="importFile" type="file" accept="application/json" style="display:none" onchange="importData(event)">
      </div>
    </div>
    <section id="dashboard" class="view"></section>
    <section id="sources" class="view hidden"></section>
    <section id="satellites" class="view hidden"></section>
    <section id="stations" class="view hidden"></section>
    <section id="adapters" class="view hidden"></section>
    <section id="matching" class="view hidden"></section>
    <section id="missions" class="view hidden"></section>
    <section id="commercial" class="view hidden"></section>
    <section id="governance" class="view hidden"></section>
    <section id="copilot" class="view hidden"></section>
  </main>
</div>
<script>
const seedSources=[
{record_id:'SRC-SAT-CELESTRAK-001',category:'Satellite catalogue / orbit source',name:'CelesTrak NORAD GP Element Sets',url:'https://celestrak.org/NORAD/elements/',targets:['Global Satellite Intelligence Database','Orbit / Ephemeris Source Library','Satellite Profile Template'],useful:['Current GP / TLE / OMM data','SATCAT and satellite catalogue references','Active satellite groups','SAR, Communications, GNSS, Starlink, OneWeb, Planet and Spire groups','CSV / JSON / OMM XML / OMM KVN formats'],fields:['NORAD catalog number','satellite group','TLE / GP source','OMM format availability','satellite category','data freshness'],confidence:'High for public orbit/catalogue metadata; not sufficient for private downlink configuration',missing:['operator commercial availability','RF downlink frequency','polarization','modulation','coding','frame structure'],next:'Use as the first satellite/orbit data source and build a satellite profile importer later.'},
{record_id:'SRC-SAT-UCS-001',category:'Satellite context database',name:'UCS Satellite Database',url:'https://www.ucsusa.org/resources/satellite-database',targets:['Global Satellite Intelligence Database','Satellite Operator Context Library'],useful:['operator and owner context','country / region','satellite purpose','orbit class','mass, power, launch date, expected lifetime','apogee, perigee, inclination, period'],fields:['satellite name','country of origin','purpose','operator / owner / builder','orbit parameters','launch information'],confidence:'Useful for open-source satellite context; updates are paused and must be cross-checked',missing:['current operational status after last update','private RF/downlink configuration','commercial service availability'],next:'Use as a historical/context supplement, not as the only current source.'},
{record_id:'SRC-GS-AWS-001',category:'Cloud ground station architecture reference',name:'AWS Ground Station How It Works',url:'https://docs.aws.amazon.com/ground-station/latest/ug/how-it-works.html',targets:['Ground Station System Interface Database','Mission Profile Template','Dispatch Workflow Reference Library'],useful:['satellite onboarding workflow','mission profile composition','contact scheduling','contact execution','dataflows','antenna capabilities abstraction','digital twin concept'],fields:['onboarding status','valid ephemeris requirement','mission profile components','tracking config','dataflow source / destination','contact status lifecycle','site capability concept'],confidence:'High for cloud GSaaS workflow reference; not a source for all third-party station details',missing:['individual third-party station RF-chain detail','partner station commercial terms outside AWS'],next:'Use as an architecture benchmark for the Mission Profile and Contact Scheduling model.'},
{record_id:'SRC-GS-LEAF-001',category:'Commercial GSaaS network reference',name:'Leaf Space / Leaf Line',url:'https://leaf.space/leaf-line/',targets:['Global Ground Station Compatibility Database','GSaaS Benchmark Library','Partner Adapter Database'],useful:['commercial GSaaS network model','global antenna and location count','S / X / Ka support','smart and on-demand booking','RESTful API onboarding model','technical feasibility check','end-to-end compatibility check','near-real-time data transfer','S3-style payload file transfer examples'],fields:['network size','frequency bands','booking modes','data delivery modes','pricing model','onboarding workflow','support model'],confidence:'High for public Leaf Line service model; insufficient for individual antenna RF/baseband fingerprint',missing:['per-site exact coordinates','per-antenna model','per-site RF chain','baseband details','actual station restrictions'],next:'Use as a public GSaaS benchmark and compare with GS LinkOps AI positioning.'},
{record_id:'SRC-GS-SATNOGS-001',category:'Open ground station network reference',name:'SatNOGS Network',url:'https://network.satnogs.org/',targets:['Open Ground Station Reference Library','Source Evidence Library','Station Metadata Normalization Reference'],useful:['open ground station network structure','observation scheduling model','community station metadata','open satellite transmitter database reference','public API-style reuse reference'],fields:['station identity','observation records','satellite transmitter information','network status concept'],confidence:'Useful for open network concepts and metadata; not equivalent to commercial X-band payload downlink capability',missing:['commercial service availability','X-band payload downlink support','booking contract terms','professional SLA','secure delivery path'],next:'Use for open metadata and interface inspiration, not as commercial station availability source.'}
];
const blank={sources:seedSources,satellites:[],stations:[],adapters:[],missions:[],commercial:[],audit:[]};
let db=JSON.parse(localStorage.getItem('gsLinkOpsAIEnglish')||'null')||structuredClone(blank);let active='dashboard';
const pages={dashboard:['Command Dashboard','Database-first operating view for GS LinkOps AI.'],sources:['Source Evidence Library','Structured public and partner evidence for database building.'],satellites:['Satellite Intelligence','Satellite profiles, orbit sources, operator context and downlink configuration.'],stations:['Ground Station Compatibility','Station fingerprints, RF/baseband profiles, workflows and delivery paths.'],adapters:['System Adapters','Partner portals, APIs, SFTP, manual workflows and status mapping.'],matching:['Matching Intelligence','Technical, time, commercial, delivery and risk matching logic.'],missions:['Mission Cases','Validated tests, failures, operational lessons and reusable cases.'],commercial:['Commercial & Settlement','Pricing rules, billing triggers, supplier settlement and margin logic.'],governance:['Governance & Authorization','Approval gates, confidence levels, evidence control and audit.'],copilot:['AI Copilot','AI extraction, normalization, risk flags and recommended next actions.']};
function save(a='update'){db.audit.unshift({time:new Date().toISOString(),action:a});localStorage.setItem('gsLinkOpsAIEnglish',JSON.stringify(db));renderAll();}
function nav(){document.getElementById('nav').innerHTML=Object.keys(pages).map(k=>`<button class="${active===k?'active':''}" onclick="show('${k}')">${pages[k][0]}</button>`).join('');}
function show(k){active=k;document.querySelectorAll('.view').forEach(v=>v.classList.add('hidden'));document.getElementById(k).classList.remove('hidden');document.getElementById('pageTitle').textContent=pages[k][0];document.getElementById('pageDesc').textContent=pages[k][1];nav();renderAll();}
function pill(v,c='info'){return `<span class="pill ${c}">${v}</span>`}
function list(a){return `<ul>${(a||[]).map(x=>`<li>${x}</li>`).join('')}</ul>`}
function card(title,body){return `<div class="section"><h2>${title}</h2>${body}</div>`}
function exportData(){const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='gs-linkops-ai-english-database.json';a.click();}
function importData(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{db=JSON.parse(r.result);save('import database')};r.readAsText(f);}
function resetAll(){if(confirm('Reset the English platform data?')){db=structuredClone(blank);save('reset database')}}
function renderDashboard(){document.getElementById('dashboard').innerHTML=`<div class="grid cards"><div class="card"><small>Source Records</small><div class="num">${db.sources.length}</div><small>evidence entries</small></div><div class="card"><small>Satellite Profiles</small><div class="num">${db.satellites.length}</div><small>to be enriched</small></div><div class="card"><small>Station Fingerprints</small><div class="num">${db.stations.length}</div><small>to be validated</small></div><div class="card"><small>Mission Cases</small><div class="num">${db.missions.length}</div><small>success/failure memory</small></div></div>`+card('Core Operating Rule','<div class="workflow"><div class="step"><b>Collect</b><span>Find public, semi-public and partner evidence.</span></div><div class="step"><b>Structure</b><span>Normalize sources into database fields.</span></div><div class="step"><b>Verify</b><span>Mark confidence, unknowns and evidence.</span></div><div class="step"><b>Match</b><span>Compare configuration objects and rank options.</span></div><div class="step"><b>Authorize</b><span>Dispatch only after approval.</span></div></div>')+card('Product Positioning','<div class="alert">GS LinkOps AI is a satellite downlink dispatch and resource orchestration platform. The long-term value is the database: satellite intelligence, ground-station compatibility, system adapters, mission cases, commercial rules and risk tags.</div>');}
function renderSources(){let q=(document.getElementById('sourceSearch')?.value||'').toLowerCase();let arr=db.sources.filter(s=>JSON.stringify(s).toLowerCase().includes(q));document.getElementById('sources').innerHTML=`<div class="searchbar"><input id="sourceSearch" placeholder="Search source records..." oninput="renderSources()"><button class="btn primary" onclick="addSeedSources()">Reload Seed Sources</button></div><div class="grid">${arr.map(s=>`<div class="section"><h2>${s.name}</h2><p>${pill(s.category,'purple')} ${pill(s.record_id,'info')}</p><p><b>Source:</b> <a href="${s.url}" target="_blank" style="color:#7cf0b2">${s.url}</a></p><div class="grid two"><div><h3>Useful For</h3>${list(s.useful)}<h3>Extractable Fields</h3>${list(s.fields)}</div><div><h3>Database Targets</h3>${list(s.targets)}<h3>Missing Fields</h3>${list(s.missing)}<div class="alert"><b>Confidence:</b><br>${s.confidence}</div><div class="alert"><b>Next Action:</b><br>${s.next}</div></div></div></div>`).join('')}</div>`;}
function addSeedSources(){db.sources=seedSources;save('reload seed source evidence');}
function placeholder(id,title,items){document.getElementById(id).innerHTML=card(title,`<div class="alert">This module is ready. Records will be progressively created from the Source Evidence Library.</div>${list(items)}`)}
function renderAll(){renderDashboard();renderSources();placeholder('satellites','Satellite Intelligence Fields',['Satellite name','NORAD ID','International Designator','Operator','Orbit source','RF/downlink profile','Confidence level','Source evidence']);placeholder('stations','Ground Station Fingerprint Fields',['Station identity','Antenna profile','RF chain','Receiver/baseband','Booking workflow','Delivery path','Commercial rule','Risk tags','Operational history']);placeholder('adapters','Partner Adapter Fields',['API / portal / email / manual workflow','Field mapping','Status mapping','Security requirement','Fallback process','Evidence source']);placeholder('matching','Matching Logic',['Technical match','Time/pass match','Commercial match','Delivery match','Risk/compliance match','Confidence-ranked recommendation']);placeholder('missions','Mission Case Memory',['Test case','Failure case','Operational success','Lessons learned','Reusable matching rule']);placeholder('commercial','Commercial Records',['Pricing model','Minimum charge','Currency','Supplier settlement','Customer billing trigger','Gross margin']);placeholder('governance','Authorization & Governance',['Owner approval','Partner confirmation','Customer authorization','Risk review','Evidence traceability','Audit log']);placeholder('copilot','AI Copilot Functions',['Read documents','Extract parameters','Normalize terms','Identify unknowns','Rank candidate stations','Draft confirmation questions','Generate source summaries']);}
show('dashboard');
</script>
</body>
</html>
