<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>StellarDEM Resource Catalog</title><style>:root{--bg:#f5f7fb;--card:#fff;--text:#202a36;--muted:#778392;--line:#e2e7ee;--accent:#2c7df0;--dark:#071b2d;--green:#27b77a}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:Inter,Arial,sans-serif;color:var(--text)}header{background:#fff;border-bottom:1px solid var(--line);padding:28px 4vw 18px;position:sticky;top:0;z-index:10}.logo{text-align:center;font-size:42px;letter-spacing:18px;font-weight:900;margin:0}.sub{text-align:center;color:var(--muted);letter-spacing:7px;font-size:13px;margin-top:6px}.nav{display:flex;gap:18px;justify-content:center;flex-wrap:wrap;margin-top:24px}.cat{border:0;background:#fff;color:#7b8491;cursor:pointer;padding:8px 10px;border-radius:12px}.cat span{display:block;font-size:24px;margin-bottom:4px}.cat.on,.cat:hover{background:#edf5ff;color:var(--accent)}.bar{display:flex;justify-content:space-between;align-items:center;gap:18px;padding:28px 4vw 12px}.bar h2{font-size:18px;font-weight:500}.search{width:330px;max-width:100%;padding:13px 15px;border:1px solid var(--line);border-radius:12px;background:#fff}.grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:22px;padding:12px 4vw 48px}.card{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:0 4px 18px #00000010;transition:.2s}.card:hover{transform:translateY(-4px);box-shadow:0 18px 38px #0000001a}.img{height:164px;background:linear-gradient(135deg,#1c6ea4,#7ce2ff);position:relative;overflow:hidden}.img:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 20% 20%,#fff8,transparent 18%),linear-gradient(45deg,transparent 0 20%,#0002 21% 25%,transparent 26% 45%,#fff3 46% 50%,transparent 51%)}.img.open{background:linear-gradient(135deg,#71c66b,#3f8ad8)}.img.own{background:linear-gradient(135deg,#102e56,#47e4ff)}.img.service{background:linear-gradient(135deg,#ef7b45,#ffd166)}.img.qc{background:linear-gradient(135deg,#6d5dfc,#45d7ff)}.body{padding:18px}.type{display:inline-block;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:#fff;background:#94a0ad;border-radius:999px;padding:5px 8px;margin-bottom:12px}.type.own{background:#132f55}.type.open{background:#27b77a}.type.service{background:#e87936}.type.qc{background:#6d5dfc}h3{font-size:20px;line-height:1.18;margin:0 0 12px}.delivery{color:var(--muted);margin-bottom:34px}.price{border-top:1px solid var(--line);padding-top:14px;color:#8a929c}.price b{color:#5b6570}.actions{display:flex;gap:8px;margin-top:14px}.btn{border:1px solid var(--line);background:#fff;border-radius:10px;padding:9px 10px;cursor:pointer;font-weight:700}.btn.main{background:var(--dark);color:#fff;border-color:var(--dark)}.note{margin:0 4vw 20px;padding:16px 18px;background:#fff;border:1px solid var(--line);border-radius:14px;color:#677280}.pill{display:inline-block;background:#eef5ff;color:#2c7df0;border-radius:999px;padding:5px 8px;margin:3px;font-size:12px}@media(max-width:1250px){.grid{grid-template-columns:repeat(4,1fr)}}@media(max-width:980px){.grid{grid-template-columns:repeat(3,1fr)}.logo{font-size:32px;letter-spacing:10px}}@media(max-width:700px){.grid{grid-template-columns:1fr}.bar{display:block}.search{width:100%}.nav{justify-content:flex-start}.logo{text-align:left}.sub{text-align:left}}</style></head><body><header><div class="logo">STELLAR</div><div class="sub">GEOSPATIAL RESOURCE CATALOG</div><div class="nav"><button class="cat on" onclick="filter('all',this)"><span>★</span>All</button><button class="cat" onclick="filter('Own',this)"><span>🌍</span>Own Products</button><button class="cat" onclick="filter('Open',this)"><span>🛰️</span>Open Resources</button><button class="cat" onclick="filter('Elevation',this)"><span>⛰️</span>Elevation</button><button class="cat" onclick="filter('Imagery',this)"><span>🗺️</span>Imagery</button><button class="cat" onclick="filter('Analytics',this)"><span>⚙️</span>Analytics</button><button class="cat" onclick="filter('QC',this)"><span>🛡️</span>QC</button><button class="cat" onclick="filter('Delivery',this)"><span>📦</span>Delivery</button></div></header><section class="bar"><h2 id="count">Products & Resources</h2><input class="search" id="search" oninput="render()" placeholder="Search resource, product, use case..."></section><div class="note">Catalog rule: only list open-source/open-data resources and StellarDEM-controlled products or services. No third-party commercial product is displayed as if it is owned by the platform. <span class="pill">Open Data</span><span class="pill">Own Product</span><span class="pill">Factory Service</span></div><main class="grid" id="grid"></main><script>const items=[['Own','Elevation','StellarDEM Digital Surface Model','DSM 2m country or AOI package','From project quotation','own'],['Own','Imagery','StellarDEM Orthoimagery Bundle','DOM 0.65m with same-area DSM option','From project quotation','own'],['Own','Imagery','0.325m Super-Resolution DOM','Value-added enhancement for selected AOI','Add-on service','own'],['Own','Delivery','Country Pack Delivery','DSM/DOM package by country or large region','Custom','service'],['Own','QC','Accuracy Statement Package','QC report based on agreed reference data','Custom','qc'],['Open','Elevation','Copernicus DEM','Open global DEM reference for screening and QC','Open resource','open'],['Open','Elevation','SRTM / NASADEM','Open elevation baseline for terrain reference','Open resource','open'],['Open','Elevation','ASTER GDEM','Open DEM reference for broad assessment','Open resource','open'],['Open','Imagery','Sentinel-2 Optical Imagery','Open multispectral imagery for land cover and visual reference','Open resource','open'],['Open','Imagery','Landsat Archive','Open long-term imagery archive for change context','Open resource','open'],['Open','Analytics','Sentinel-1 SAR','Open SAR imagery for water, flood and surface monitoring','Open resource','open'],['Open','Analytics','ESA WorldCover','Open land cover reference layer','Open resource','open'],['Open','Analytics','Dynamic World','Open near-real-time land cover probability reference','Open resource','open'],['Open','Analytics','OpenStreetMap Vectors','Open roads, buildings, water and POI vectors','Open resource','open'],['Open','QC','ICESat-2 / GEDI References','Open elevation/vegetation reference where applicable','Open resource','open'],['Own','Analytics','Custom AOI Production Task','Factory task generation for DSM/DOM production','Custom','service'],['Own','Analytics','Infrastructure Mapping Bundle','DSM/DOM + vector/reference integration workflow','Custom','service'],['Own','Analytics','Water & Flood Assessment Bundle','Open resources + custom AOI analysis workflow','Custom','service'],['Own','Analytics','Mining & Stockpile Support','DSM/DOM based terrain and volume workflow','Custom','service'],['Own','Delivery','Owner-Controlled Release Package','Tile index, delivery note and owner-only release control','Included by project','qc']];let current='all';function filter(c,b){current=c;document.querySelectorAll('.cat').forEach(x=>x.classList.remove('on'));b.classList.add('on');render()}function render(){const q=document.getElementById('search').value.toLowerCase();const data=items.filter(x=>(current==='all'||x[0]===current||x[1]===current)&&x.join(' ').toLowerCase().includes(q));count.innerText=data.length+' of '+items.length+' Products & Resources';grid.innerHTML=data.map(x=>`<article class="card"><div class="img ${x[5]}"></div><div class="body"><span class="type ${x[5]}">${x[0]} · ${x[1]}</span><h3>${x[2]}</h3><div class="delivery">${x[3]}</div><div class="price">Status: <b>${x[4]}</b></div><div class="actions"><button class="btn main" onclick="useItem('${x[2]}')">Use in AOI</button><button class="btn" onclick="copyText('${x[2]}')">Copy</button></div></div></article>`).join('')}function useItem(t){localStorage.setItem('selectedCatalogProduct',t);alert('Selected for AOI: '+t+'\nOpen factory.html to draw AOI.')}function copyText(t){navigator.clipboard&&navigator.clipboard.writeText(t)}render();</script></body></html>
