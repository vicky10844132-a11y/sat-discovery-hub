<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GS LinkOps AI</title><style>:root{--bg:#07101f;--panel:#0d1b31;--panel2:#10243d;--line:#2b4664;--text:#eef6ff;--muted:#9fb4cb;--cyan:#41e0ff;--green:#79f2b3;--amber:#ffd166;--red:#ff6b78;--blue:#55a7ff}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 10% 0,#173a63 0,#07101f 42%,#050a13 100%);color:var(--text);font-family:Inter,Arial,sans-serif}button,input,select,textarea{font:inherit}.shell{display:grid;grid-template-columns:286px 1fr;min-height:100vh}.side{position:sticky;top:0;height:100vh;background:#071426;border-right:1px solid var(--line);padding:22px;overflow:auto}.brand{display:flex;gap:12px;align-items:center;margin-bottom:20px}.logo{width:46px;height:46px;border-radius:15px;background:linear-gradient(135deg,var(--cyan),var(--green));display:grid;place-items:center;color:#06101c;font-weight:1000;box-shadow:0 0 28px #41e0ff55}.brand b{font-size:18px}.brand span{display:block;color:var(--muted);font-size:12px;margin-top:3px}.tag{display:inline-flex;border:1px solid #315072;background:#0b1d33;color:#b8d5ef;border-radius:999px;padding:6px 9px;font-size:11px;font-weight:900}.nav{margin-top:18px}.nav button{width:100%;text-align:left;border:1px solid transparent;background:transparent;color:#cfe3f8;border-radius:14px;padding:12px;margin:4px 0;cursor:pointer;font-weight:800}.nav button:hover,.nav button.active{border-color:#315072;background:#132844;color:#fff}.main{padding:24px 28px 40px;max-width:1500px;width:100%;margin:0 auto}.topbar{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:20px}.title h1{margin:0;font-size:30px}.title p{margin:7px 0 0;color:var(--muted);line-height:1.45}.actions{display:flex;gap:10px;flex-wrap:wrap}.btn{border:1px solid #315072;background:#132844;color:#e9f6ff;border-radius:12px;padding:10px 13px;cursor:pointer;font-weight:900}.btn.primary{background:linear-gradient(135deg,var(--cyan),var(--green));color:#06101c;border:0}.btn.danger{border-color:#8c3440;color:#ffd6da}.grid{display:grid;gap:16px}.cards{grid-template-columns:repeat(4,minmax(0,1fr))}.two{grid-template-columns:1.05fr .95fr}.three{grid-template-columns:repeat(3,1fr)}.section,.card{border:1px solid var(--line);background:linear-gradient(180deg,#10213a,#0a172b);border-radius:22px;padding:18px;box-shadow:0 18px 40px #0005}.section h2{font-size:20px;margin:0 0 12px}.card small{color:var(--muted);line-height:1.4}.num{font-size:34px;font-weight:1000;margin:5px 0}.muted{color:var(--muted)}.pill{display:inline-block;border-radius:999px;padding:5px 8px;font-size:11px;font-weight:1000;border:1px solid}.ok{color:#caffdf;background:#0d3026;border-color:#2b8b61}.pending{color:#ffe8a8;background:#2f260f;border-color:#8c6e22}.info{color:#cce9ff;background:#102b4b;border-color:#3471aa}.bad{color:#ffd6da;background:#33141b;border-color:#8c3440}.table{width:100%;border-collapse:separate;border-spacing:0 9px}.table th{font-size:12px;text-align:left;color:#8faac5;padding:0 10px}.table td{background:#0f223b;border-top:1px solid #294765;border-bottom:1px solid #294765;padding:12px 10px;font-size:13px;vertical-align:top}.table td:first-child{border-left:1px solid #294765;border-radius:14px 0 0 14px}.table td:last-child{border-right:1px solid #294765;border-radius:0 14px 14px 0}.empty{border:1px dashed #45627e;background:#0b1b31;border-radius:18px;padding:20px;color:#c7d8e8;line-height:1.55}.fieldgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.field{display:grid;gap:5px}.field label{font-size:12px;color:#9fb4cb;font-weight:900}.field input,.field select,.field textarea{background:#08182d;border:1px solid #315072;color:#fff;border-radius:12px;padding:10px;min-width:0}.field textarea{min-height:82px}.alert{border:1px solid #315072;background:#0e2038;border-radius:16px;padding:12px;line-height:1.45;font-size:13px;margin-bottom:10px}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}.hidden{display:none!important}.footer{margin-top:18px;color:#7892ad;font-size:12px;line-height:1.45}.copilot{background:linear-gradient(135deg,#132844,#101936 55%,#0b1a2e);border-color:#45679a}.score{height:8px;background:#06101f;border-radius:999px;overflow:hidden;border:1px solid #27405f}.score div{height:100%;background:linear-gradient(90deg,var(--red),var(--amber),var(--green))}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}.workflow{display:grid;grid-template-columns:repeat(6,1fr);gap:9px}.step{border:1px solid #315072;background:#0b1d33;border-radius:16px;padding:12px;min-height:76px}.step b{font-size:12px}.step span{display:block;color:#9fb4cb;font-size:11px;margin-top:7px}@media(max-width:1100px){.shell{grid-template-columns:1fr}.side{position:relative;height:auto}.cards,.two,.three,.fieldgrid,.workflow{grid-template-columns:1fr}}</style></head><body><div class="shell"><aside class="side"><div class="brand"><div class="logo">GS</div><div><b>GS LinkOps AI</b><span>Functional platform shell</span></div></div><div class="tag">v0.1 no preloaded resources</div><nav class="nav" id="nav"></nav><p class="footer">数据现在全部为空。你提供统一资源包后，可以通过 Resource Center 录入；本页面已支持本地保存、导入、导出、调度、任务、传输、计费和报告流程。</p></aside><main class="main"><div class="topbar"><div class="title"><h1 id="pageTitle"></h1><p id="pageDesc"></p></div><div class="actions"><button class="btn" onclick="exportData()">Export JSON</button><button class="btn" onclick="document.getElementById('importFile').click()">Import JSON</button><button class="btn danger" onclick="resetAll()">Reset</button><input id="importFile" type="file" accept="application/json" style="display:none" onchange="importData(event)"></div></div><section id="dashboard" class="view"></section><section id="resources" class="view hidden"></section><section id="scheduling" class="view hidden"></section><section id="missions" class="view hidden"></section><section id="transfer" class="view hidden"></section><section id="billing" class="view hidden"></section><section id="reports" class="view hidden"></section><section id="copilot" class="view hidden"></section></main></div><script>const blank={orgs:[],contacts:[],stations:[],sats:[],missions:[],transfers:[],billing:[]};let db=JSON.parse(localStorage.getItem('gsLinkOpsAI')||'null')||structuredClone(blank);let active='dashboard';const pages={dashboard:['Command Dashboard','系统中控总览：资源、调度、任务、传输、计费和 AI 风险。'],resources:['Resource Center','录入和管理机构、联系人、卫星资源、地面站资源。'],scheduling:['Scheduling Center','根据已录入卫星和地面站生成可用窗口、能力匹配和推荐。'],missions:['Mission Control','创建下行任务，推进状态，记录配置与接收结果。'],transfer:['Transfer Center','管理数据回传链路、文件清单、checksum 和厂家确认。'],billing:['Billing Center','按规则判断可计费状态，计算成本、售价、服务费和毛利。'],reports:['Report Center','自动生成任务报告、传输报告和计费说明。'],copilot:['AI Copilot','基于当前数据做完整性检查、风险提醒、推荐和失败分析。']};function save(){localStorage.setItem('gsLinkOpsAI',JSON.stringify(db));renderAll()}function uid(p){return p+'-'+Date.now().toString(36).slice(-6)+'-'+Math.random().toString(36).slice(2,5).toUpperCase()}function nav(){document.getElementById('nav').innerHTML=Object.keys(pages).map(k=>`<button class="${active===k?'active':''}" onclick="show('${k}')">${pages[k][0]}</button>`).join('')}function show(k){active=k;document.querySelectorAll('.view').forEach(v=>v.classList.add('hidden'));document.getElementById(k).classList.remove('hidden');document.getElementById('pageTitle').textContent=pages[k][0];document.getElementById('pageDesc').textContent=pages[k][1];nav();renderAll()}function pill(v,c='info'){return `<span class="pill ${c}">${v}</span>`}function empty(t,b){return `<div class="empty"><b>${t}</b><br>${b}</div>`}function val(id){return document.getElementById(id)?.value?.trim()||''}function addOrg(){db.orgs.push({id:uid('ORG'),name:val('orgName'),type:val('orgType'),country:val('orgCountry'),notes:val('orgNotes')});save()}function addContact(){db.contacts.push({id:uid('CON'),name:val('contactName'),org:val('contactOrg'),role:val('contactRole'),email:val('contactEmail'),phone:val('contactPhone')});save()}function addStation(){db.stations.push({id:val('stId')||uid('STN'),name:val('stName'),org:val('stOrg'),country:val('stCountry'),lat:+val('stLat')||0,lon:+val('stLon')||0,band:val('stBand'),freq:val('stFreq'),polar:val('stPolar'),minEl:+val('stMinEl')||10,maxRate:+val('stRate')||0,transfer:val('stTransfer'),status:val('stStatus'),cost:+val('stCost')||0});save()}function addSat(){db.sats.push({id:val('satId')||uid('SAT'),name:val('satName'),org:val('satOrg'),norad:val('satNorad'),tle:val('satTle'),band:val('satBand'),freq:val('satFreq'),polar:val('satPolar'),mod:val('satMod'),coding:val('satCoding'),rate:+val('satRate')||0,status:val('satStatus')});save()}function del(type,id){db[type]=db[type].filter(x=>x.id!==id);save()}function forms(){let orgOptions=db.orgs.map(o=>`<option value="${o.id}">${o.name||o.id}</option>`).join('');return `<div class="grid two"><div class="section"><h2>Add Organization</h2><div class="fieldgrid"><div class="field"><label>Name</label><input id="orgName"></div><div class="field"><label>Type</label><select id="orgType"><option>Satellite Operator</option><option>Ground Station Partner</option><option>Manufacturer</option><option>Customer</option><option>Supplier</option><option>Internal Entity</option></select></div><div class="field"><label>Country</label><input id="orgCountry"></div><div class="field"><label>Notes</label><input id="orgNotes"></div></div><br><button class="btn primary" onclick="addOrg()">Add Organization</button></div><div class="section"><h2>Add Contact</h2><div class="fieldgrid"><div class="field"><label>Name</label><input id="contactName"></div><div class="field"><label>Organization</label><select id="contactOrg">${orgOptions}</select></div><div class="field"><label>Role</label><input id="contactRole"></div><div class="field"><label>Email</label><input id="contactEmail"></div><div class="field"><label>Phone</label><input id="contactPhone"></div></div><br><button class="btn primary" onclick="addContact()">Add Contact</button></div></div><div class="grid two" style="margin-top:16px"><div class="section"><h2>Add Ground Station</h2><div class="fieldgrid"><div class="field"><label>Station ID</label><input id="stId" placeholder="auto if blank"></div><div class="field"><label>Name</label><input id="stName"></div><div class="field"><label>Organization</label><select id="stOrg">${orgOptions}</select></div><div class="field"><label>Country / City</label><input id="stCountry"></div><div class="field"><label>Latitude</label><input id="stLat" type="number" step="0.0001"></div><div class="field"><label>Longitude</label><input id="stLon" type="number" step="0.0001"></div><div class="field"><label>Supported Band</label><input id="stBand" placeholder="X-band / S-band"></div><div class="field"><label>Frequency Range</label><input id="stFreq"></div><div class="field"><label>Polarization</label><input id="stPolar"></div><div class="field"><label>Minimum Elevation</label><input id="stMinEl" type="number" value="10"></div><div class="field"><label>Max Data Rate Mbps</label><input id="stRate" type="number"></div><div class="field"><label>Transfer Method</label><select id="stTransfer"><option>SFTP</option><option>FTP</option><option>S3</option><option>VPN</option><option>Dedicated Server</option></select></div><div class="field"><label>Status</label><select id="stStatus"><option>Draft</option><option>Onboarding</option><option>Authorized</option><option>Suspended</option></select></div><div class="field"><label>Cost per pass USD</label><input id="stCost" type="number"></div></div><br><button class="btn primary" onclick="addStation()">Add Ground Station</button></div><div class="section"><h2>Add Satellite</h2><div class="fieldgrid"><div class="field"><label>Satellite ID</label><input id="satId" placeholder="auto if blank"></div><div class="field"><label>Name</label><input id="satName"></div><div class="field"><label>Organization</label><select id="satOrg">${orgOptions}</select></div><div class="field"><label>NORAD ID</label><input id="satNorad"></div><div class="field"><label>TLE / Orbit Notes</label><input id="satTle"></div><div class="field"><label>Band</label><input id="satBand"></div><div class="field"><label>Downlink Frequency</label><input id="satFreq"></div><div class="field"><label>Polarization</label><input id="satPolar"></div><div class="field"><label>Modulation</label><input id="satMod"></div><div class="field"><label>Coding</label><input id="satCoding"></div><div class="field"><label>Data Rate Mbps</label><input id="satRate" type="number"></div><div class="field"><label>Status</label><select id="satStatus"><option>Draft</option><option>Authorized</option><option>Testing</option><option>Suspended</option></select></div></div><br><button class="btn primary" onclick="addSat()">Add Satellite</button></div></div>`}function renderDashboard(){document.getElementById('dashboard').innerHTML=`<div class="grid cards"><div class="card"><small>Organizations</small><div class="num">${db.orgs.length}</div><small>合作方 / 厂家 / 站方</small></div><div class="card"><small>Ground Stations</small><div class="num">${db.stations.length}</div><small>已录入地面站</small></div><div class="card"><small>Satellites</small><div class="num">${db.sats.length}</div><small>已录入卫星</small></div><div class="card"><small>Open Missions</small><div class="num">${db.missions.length}</div><small>下行任务</small></div></div><div class="grid two" style="margin-top:16px"><div class="section"><h2>Operational Workflow</h2><div class="workflow">${['Resource Intake','Capability Match','Contact Planning','Mission Control','Transfer Handover','Billing & Report'].map(x=>`<div class="step"><b>${x}</b><span>${workflowStatus(x)}</span></div>`).join('')}</div></div><div class="section copilot"><h2>AI Readiness</h2>${aiAlerts().map(a=>`<div class="alert">${a}</div>`).join('')}</div></div>`}function workflowStatus(x){if(x==='Resource Intake')return db.stations.length&&db.sats.length?'Ready':'Waiting resources';if(x==='Capability Match')return db.stations.length&&db.sats.length?'Usable':'Need station + satellite';if(x==='Contact Planning')return db.stations.length&&db.sats.length?'Usable':'Need coordinates + orbit';if(x==='Mission Control')return db.missions.length?'Active':'No missions';if(x==='Transfer Handover')return db.transfers.length?'Active':'No transfer jobs';return db.billing.length?'Active':'No billing records'}function renderResources(){document.getElementById('resources').innerHTML=forms()+`<div class="grid two" style="margin-top:16px"><div class="section"><h2>Organizations</h2>${table(db.orgs,['name','type','country'],'orgs')}</div><div class="section"><h2>Contacts</h2>${table(db.contacts,['name','role','email'],'contacts')}</div></div><div class="grid two" style="margin-top:16px"><div class="section"><h2>Ground Stations</h2>${table(db.stations,['name','country','band','status'],'stations')}</div><div class="section"><h2>Satellites</h2>${table(db.sats,['name','norad','band','status'],'sats')}</div></div>`}function table(arr,cols,type){if(!arr.length)return empty('No records','Use the form above to add approved data.');return `<table class="table"><tr>${cols.map(c=>`<th>${c}</th>`).join('')}<th>Action</th></tr>${arr.map(r=>`<tr>${cols.map(c=>`<td>${r[c]||''}</td>`).join('')}<td><button class="btn danger" onclick="del('${type}','${r.id}')">Delete</button></td></tr>`).join('')}</table>`}function matches(sa,st){let reasons=[],score=35;if(st.status==='Authorized'){score+=15}else reasons.push('station not authorized');if(sa.status==='Authorized'||sa.status==='Testing'){score+=15}else reasons.push('satellite not authorized/testing');if(st.band&&sa.band&&st.band.toLowerCase().includes(sa.band.toLowerCase().split('/')[0].trim()))score+=15;else reasons.push('band needs confirmation');if(!sa.rate||!st.maxRate||st.maxRate>=sa.rate)score+=10;else reasons.push('data rate may exceed station capacity');if(st.polar&&sa.polar&&st.polar.toLowerCase().includes(sa.polar.toLowerCase().split('/')[0].trim()))score+=10;else reasons.push('polarization needs confirmation');return{score:Math.min(100,score),match:score>=80?'Matched':score>=55?'Conditional':'Need Review',reason:reasons.join('; ')||'parameters look usable'}}function windows(){let out=[];db.sats.forEach((sa,si)=>db.stations.forEach((st,gi)=>{let m=matches(sa,st);let base=(parseInt(sa.norad||'10000')+Math.round(Math.abs(st.lat*10))+gi*71+si*47)%720;let h=String(Math.floor(base/60)).padStart(2,'0'),min=String(base%60).padStart(2,'0');let dur=8+((base+gi)%8);let elev=Math.max(10,Math.min(86,20+(m.score%50)+gi*3));out.push({sat:sa.id,station:st.id,start:`D+1 ${h}:${min} UTC`,end:`+${dur} min`,elev,score:m.score,match:m.match,reason:m.reason})}));return out.sort((a,b)=>b.score-a.score)}function renderScheduling(){let ws=windows();document.getElementById('scheduling').innerHTML=db.sats.length&&db.stations.length?`<div class="section"><h2>Contact Planner</h2><table class="table"><tr><th>Satellite</th><th>Station</th><th>Window</th><th>Max Elev.</th><th>Match</th><th>Score</th><th>Action</th></tr>${ws.map(w=>`<tr><td>${satName(w.sat)}</td><td>${stName(w.station)}</td><td>${w.start} / ${w.end}</td><td>${w.elev}°</td><td>${pill(w.match,w.match==='Matched'?'ok':'pending')}<br><small>${w.reason}</small></td><td><div class="score"><div style="width:${w.score}%"></div></div>${w.score}/100</td><td><button class="btn primary" onclick="createMission('${w.sat}','${w.station}','${w.start} / ${w.end}')">Create Mission</button></td></tr>`).join('')}</table></div>`:empty('Scheduling waiting for resources','Add at least one approved satellite and one approved ground station first.')}function createMission(sa,st,win){let seq=String(db.missions.length+1).padStart(4,'0');let id=`GS-${seq}`;db.missions.push({id,sat:sa,station:st,window:win,status:'New Request',config:'Pending',signal:'Pending',created:new Date().toISOString()});save();show('missions')}function nextStatus(id){let flow=['New Request','Auto Matched','Station Confirmed','Configured','Scheduled','In Pass','Signal Acquired','Carrier Locked','Demod Locked','Frame Synced','Data Captured','Transfer Waiting'];let m=db.missions.find(x=>x.id===id);m.status=flow[Math.min(flow.indexOf(m.status)+1,flow.length-1)]||'Auto Matched';if(m.status==='Configured')m.config='Confirmed';if(['Signal Acquired','Carrier Locked','Demod Locked','Frame Synced','Data Captured'].includes(m.status))m.signal=m.status;if(m.status==='Transfer Waiting'&&!db.transfers.find(t=>t.mission===id))db.transfers.push({id:uid('TRF'),mission:id,method:stationObj(m.station).transfer||'SFTP',status:'Waiting for File',files:'',size:'',checksum:'',dest:'',confirmed:false});save()}function renderMissions(){document.getElementById('missions').innerHTML=`<div class="section"><h2>Downlink Missions</h2>${db.missions.length?`<table class="table"><tr><th>ID</th><th>Satellite</th><th>Station</th><th>Window</th><th>Status</th><th>Reception</th><th>Action</th></tr>${db.missions.map(m=>`<tr><td class="mono">${m.id}</td><td>${satName(m.sat)}</td><td>${stName(m.station)}</td><td>${m.window}</td><td>${pill(m.status,m.status.includes('Failed')?'bad':m.status.includes('Data')?'ok':'info')}</td><td>${m.signal}</td><td><button class="btn" onclick="nextStatus('${m.id}')">Advance</button></td></tr>`).join('')}</table>`:empty('No missions','Create a mission from Scheduling Center after resources are added.')}</div>`}function completeTransfer(id){let t=db.transfers.find(x=>x.id===id);t.status='Transfer Completed';t.confirmed=true;if(!db.billing.find(b=>b.mission===t.mission)){let m=db.missions.find(x=>x.id===t.mission),st=stationObj(m.station);db.billing.push({id:uid('BIL'),mission:t.mission,mode:'Per successful downlink',cost:+st.cost||0,price:(+st.cost||0)+1000,status:'Billable'})}save()}function renderTransfer(){document.getElementById('transfer').innerHTML=`<div class="section"><h2>Transfer Jobs</h2>${db.transfers.length?`<table class="table"><tr><th>Mission</th><th>Method</th><th>Destination</th><th>Manifest</th><th>Checksum</th><th>Status</th><th>Action</th></tr>${db.transfers.map(t=>`<tr><td>${t.mission}</td><td>${t.method}</td><td><input value="${t.dest||''}" onchange="tEdit('${t.id}','dest',this.value)"></td><td><input value="${t.files||''}" placeholder="files / size" onchange="tEdit('${t.id}','files',this.value)"></td><td><input value="${t.checksum||''}" onchange="tEdit('${t.id}','checksum',this.value)"></td><td>${pill(t.status,t.confirmed?'ok':'pending')}</td><td><button class="btn primary" onclick="completeTransfer('${t.id}')">Complete</button></td></tr>`).join('')}</table>`:empty('No transfer jobs','Advance a mission to Transfer Waiting to create a transfer job.')}</div>`}function tEdit(id,k,v){db.transfers.find(x=>x.id===id)[k]=v;localStorage.setItem('gsLinkOpsAI',JSON.stringify(db))}function renderBilling(){document.getElementById('billing').innerHTML=`<div class="section"><h2>Billing Records</h2>${db.billing.length?`<table class="table"><tr><th>Mission</th><th>Mode</th><th>Cost</th><th>Client Price</th><th>Margin</th><th>Status</th></tr>${db.billing.map(b=>`<tr><td>${b.mission}</td><td>${b.mode}</td><td>USD ${b.cost}</td><td>USD ${b.price}</td><td>USD ${b.price-b.cost}</td><td>${pill(b.status,'ok')}</td></tr>`).join('')}</table>`:empty('No billing records','Default trigger: Transfer Completed + confirmed handover = Billable.')}</div>`}function renderReports(){document.getElementById('reports').innerHTML=`<div class="section"><h2>Auto Reports</h2>${db.missions.length?db.missions.map(m=>`<div class="alert"><b>${m.id}</b><br>${report(m)}<br><br><button class="btn" onclick="navigator.clipboard.writeText(report('${m.id}'))">Copy</button></div>`).join(''):empty('No reports','Reports will be generated automatically after missions exist.')}</div>`}function renderCopilot(){document.getElementById('copilot').innerHTML=`<div class="grid two"><div class="section copilot"><h2>AI Copilot Alerts</h2>${aiAlerts().map(a=>`<div class="alert">${a}</div>`).join('')}</div><div class="section"><h2>Best Recommendation</h2><div class="alert">${best()}</div></div></div>`}function aiAlerts(){let a=[];if(!db.orgs.length)a.push('<b>Resource governance:</b> no organizations have been added. Add partners before operational use.');if(!db.stations.length)a.push('<b>Station intake:</b> no ground station resources available.');if(!db.sats.length)a.push('<b>Satellite intake:</b> no satellite resources available.');db.sats.forEach(s=>{if(!s.tle)a.push(`<b>${s.name||s.id}:</b> TLE/orbit information missing.`);if(!s.band||!s.polar)a.push(`<b>${s.name||s.id}:</b> downlink band or polarization incomplete.`)});db.stations.forEach(s=>{if(!s.lat&&!s.lon)a.push(`<b>${s.name||s.id}:</b> station coordinates missing.`);if(s.status!=='Authorized')a.push(`<b>${s.name||s.id}:</b> station not marked Authorized.`)});db.missions.forEach(m=>{if(m.status==='Transfer Waiting')a.push(`<b>${m.id}:</b> transfer job should be completed before billing.`)});return a.length?a:['<b>Ready:</b> no major platform alerts detected.']}function best(){let ws=windows();if(!ws.length)return 'Add at least one approved satellite and one approved ground station to generate recommendations.';let w=ws[0];return `Recommended contact: ${satName(w.sat)} via ${stName(w.station)}. Score ${w.score}/100. Match status: ${w.match}. Reason: ${w.reason}.`}function report(x){let m=typeof x==='string'?db.missions.find(y=>y.id===x):x;let tr=db.transfers.find(t=>t.mission===m.id),b=db.billing.find(b=>b.mission===m.id);return `Mission ${m.id}: ${satName(m.sat)} via ${stName(m.station)}. Window: ${m.window}. Current status: ${m.status}. Reception state: ${m.signal}. Transfer: ${tr?tr.status:'not created'}. Billing: ${b?b.status:'not billable yet'}.`}function satName(id){return db.sats.find(s=>s.id===id)?.name||id}function stName(id){return db.stations.find(s=>s.id===id)?.name||id}function stationObj(id){return db.stations.find(s=>s.id===id)||{}}function exportData(){let blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='gs-linkops-ai-data.json';a.click()}function importData(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{db=JSON.parse(r.result);save()};r.readAsText(f)}function resetAll(){if(confirm('Clear all local GS LinkOps AI data?')){db=structuredClone(blank);save()}}function renderAll(){renderDashboard();renderResources();renderScheduling();renderMissions();renderTransfer();renderBilling();renderReports();renderCopilot()}nav();show('dashboard');</script></body></html>
