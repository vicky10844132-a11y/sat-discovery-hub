<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GS LinkOps AI Owner Console</title>
  <style>
    :root{--bg:#07111f;--panel:#0f1c2e;--panel2:#12243a;--text:#eef5ff;--muted:#91a4bf;--line:#27415f;--accent:#69b7ff;--ok:#5ee0a0;--warn:#ffd166;--bad:#ff7676;--white:#fff}
    *{box-sizing:border-box} body{margin:0;background:linear-gradient(135deg,#07111f,#0b1728 55%,#10233a);font-family:Arial,"Microsoft YaHei",sans-serif;color:var(--text)}
    header{padding:20px 26px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;background:rgba(7,17,31,.92);position:sticky;top:0;z-index:10;backdrop-filter:blur(8px)}
    h1{font-size:22px;margin:0}.sub{color:var(--muted);font-size:13px;margin-top:6px}.mode{display:flex;gap:10px;align-items:center}.mode select{background:#0d2035;color:var(--text);border:1px solid var(--line);border-radius:10px;padding:9px 12px}
    .wrap{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 74px)}
    nav{border-right:1px solid var(--line);padding:16px;background:rgba(11,24,40,.72)}
    nav button{width:100%;text-align:left;margin:4px 0;padding:12px;border:1px solid transparent;border-radius:12px;background:transparent;color:var(--muted);cursor:pointer;font-size:14px}
    nav button.active,nav button:hover{background:var(--panel2);color:var(--white);border-color:var(--line)}
    main{padding:22px}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}.card{background:rgba(15,28,46,.92);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:0 10px 25px rgba(0,0,0,.18)}
    .card h3{margin:0 0 10px;font-size:16px}.metric{font-size:28px;font-weight:700}.muted{color:var(--muted)}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.split{display:grid;grid-template-columns:1fr 1fr;gap:14px}.three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}.section{display:none}.section.active{display:block}
    input,select,textarea{width:100%;background:#081827;color:var(--text);border:1px solid var(--line);border-radius:10px;padding:10px;margin:6px 0 10px;font-family:inherit}textarea{min-height:110px;resize:vertical}
    label{font-size:12px;color:#bfd0e7}.btn{background:var(--accent);color:#06101c;border:0;border-radius:10px;padding:10px 13px;font-weight:700;cursor:pointer}.btn.secondary{background:#18314f;color:var(--text);border:1px solid var(--line)}.btn.warn{background:var(--warn)}.btn.bad{background:var(--bad);color:#1b0202}.btn.ok{background:var(--ok);color:#041b12}
    table{width:100%;border-collapse:collapse;margin-top:10px}th,td{border-bottom:1px solid var(--line);padding:9px;text-align:left;font-size:13px;vertical-align:top}th{color:#bfd0e7}.pill{display:inline-block;padding:4px 8px;border-radius:999px;font-size:12px;border:1px solid var(--line);color:#cfe2ff}.pill.ok{border-color:#3e9d75;color:#9cf0c2}.pill.warn{border-color:#ab8730;color:#ffe3a0}.pill.bad{border-color:#b65050;color:#ffc1c1}.notice{border-left:4px solid var(--accent);background:#0b2138;padding:12px;border-radius:10px;margin:10px 0}.danger{border-left-color:var(--bad)}.success{border-left-color:var(--ok)}
    .chat{height:330px;overflow:auto;background:#081827;border:1px solid var(--line);border-radius:14px;padding:12px}.msg{margin:8px 0;padding:10px;border-radius:12px;max-width:86%}.msg.user{margin-left:auto;background:#19385a}.msg.ai{background:#102844}.small{font-size:12px}.hidden{display:none}.k{color:#89c4ff}.footerNote{font-size:12px;color:var(--muted);margin-top:16px}
    @media(max-width:980px){.wrap{grid-template-columns:1fr}nav{display:flex;overflow:auto;border-right:0;border-bottom:1px solid var(--line)}nav button{min-width:190px}.grid,.split,.three{grid-template-columns:1fr}}
  </style>
</head>
<body>
<header>
  <div><h1>GS LinkOps AI Owner Console</h1><div class="sub">人工安排任务，AI 负责检查、整理、报告、计费建议，最终由你确认签字和发送。</div></div>
  <div class="mode"><span class="muted">Operation Mode</span><select id="mode" onchange="saveMode()"><option>Manual</option><option selected>AI Assist</option><option>AI Takeover</option></select></div>
</header>
<div class="wrap">
  <nav id="nav"></nav>
  <main>
    <section id="today" class="section active"></section>
    <section id="resources" class="section"></section>
    <section id="schedule" class="section"></section>
    <section id="missions" class="section"></section>
    <section id="config" class="section"></section>
    <section id="reception" class="section"></section>
    <section id="transfer" class="section"></section>
    <section id="reports" class="section"></section>
    <section id="billing" class="section"></section>
    <section id="email" class="section"></section>
    <section id="ai" class="section"></section>
    <section id="settings" class="section"></section>
  </main>
</div>
<script>
const pages=[['today','Today / Command Center'],['resources','Resources'],['schedule','Pass & Scheduling'],['missions','Missions'],['config','Configuration Check'],['reception','Reception Log'],['transfer','Transfer & Delivery'],['reports','Reports'],['billing','Billing & Settlement'],['email','Email Drafts'],['ai','AI Inspector'],['settings','Settings']];
const LS='gs_linkops_owner_console_v1';
let state=JSON.parse(localStorage.getItem(LS)||'null')||{mode:'AI Assist',orgs:[],contacts:[],stations:[],sats:[],passes:[],missions:[],configs:[],receptions:[],transfers:[],reports:[],bills:[],emails:[],audit:[]};
function save(){localStorage.setItem(LS,JSON.stringify(state));renderAll()}function audit(a){state.audit.unshift({time:new Date().toLocaleString(),action:a});localStorage.setItem(LS,JSON.stringify(state))}
function saveMode(){state.mode=document.getElementById('mode').value;save()}function id(p){return p+'-'+Date.now().toString().slice(-7)}function val(x){return document.getElementById(x)?.value?.trim()||''}
function nav(){document.getElementById('nav').innerHTML=pages.map((p,i)=>`<button class="${i==0?'active':''}" onclick="show('${p[0]}',this)">${p[1]}</button>`).join('')}function show(id,btn){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));btn.classList.add('active')}
function missing(obj,fields){return fields.filter(f=>!obj[f])}function pill(t){let c=t?.includes('Ready')||t?.includes('Authorized')||t?.includes('Billable')?'ok':t?.includes('Missing')||t?.includes('Hold')||t?.includes('Draft')?'warn':t?.includes('Not')||t?.includes('Failed')?'bad':'';return `<span class="pill ${c}">${t||''}</span>`}
function confirmAction(text,fn){if(state.mode==='Manual'||state.mode==='AI Assist'){if(!confirm(text+'\n\n该操作会修改平台记录，是否确认？'))return}fn();audit(text);save()}
function aiFindings(){let arr=[];state.stations.forEach(s=>{let m=missing(s,['name','lat','lon','band','polar','rate','auth']); if(m.length)arr.push(`地面站 ${s.name||s.id} 缺少：${m.join(', ')}`)});state.sats.forEach(s=>{let m=missing(s,['name','norad','tle1','tle2','band','polar','rate','auth']); if(m.length)arr.push(`卫星 ${s.name||s.id} 缺少：${m.join(', ')}`)});state.missions.forEach(m=>{if(!state.configs.find(c=>c.mid===m.id))arr.push(`任务 ${m.id} 缺少配置确认`); if(m.status==='Transfer Waiting'&&!state.transfers.find(t=>t.mid===m.id))arr.push(`任务 ${m.id} 等待创建传输记录`);});return arr.length?arr:['暂无重大缺失。']}
function renderToday(){let open=state.missions.filter(m=>!['Closed','Cancelled'].includes(m.status));let waitReport=state.reports.filter(r=>r.status==='Draft');let waitBill=state.bills.filter(b=>b.status!=='Owner Approved');let findings=aiFindings();document.getElementById('today').innerHTML=`<div class="grid"><div class="card"><h3>Open Missions</h3><div class="metric">${open.length}</div><div class="muted">未关闭任务</div></div><div class="card"><h3>Resources</h3><div class="metric">${state.stations.length+state.sats.length}</div><div class="muted">站点 + 卫星</div></div><div class="card"><h3>Reports Pending</h3><div class="metric">${waitReport.length}</div><div class="muted">待审核报告</div></div><div class="card"><h3>Billing Pending</h3><div class="metric">${waitBill.length}</div><div class="muted">待确认计费</div></div></div><div class="split" style="margin-top:14px"><div class="card"><h3>AI 今日检查</h3>${findings.map(x=>`<div class="notice">${x}</div>`).join('')}</div><div class="card"><h3>你今天最适合处理</h3><ol>${findings.slice(0,5).map(x=>`<li>${x}</li>`).join('')}</ol><button class="btn" onclick="askPreset('帮我检查今天该处理什么')">让 AI Inspector 生成待办</button></div></div>`}
function renderResources(){document.getElementById('resources').innerHTML=`<div class="notice">资源录入模式：AI 可以整理草稿，但必须人工确认后保存。不要让 AI 编造 TLE、频率、授权、价格。</div><div class="split"><div class="card"><h3>AI Structuring / 粘贴原始资源信息</h3><textarea id="rawRes" placeholder="把邮件、表格或聊天里的地面站/卫星信息粘贴到这里，AI 先整理成草稿。当前原型用规则抽取，后续可接入真正 AI。"></textarea><button class="btn secondary" onclick="structureResource()">AI 整理草稿</button><div id="draftRes"></div></div><div class="card"><h3>人工确认后保存</h3><label>类型</label><select id="rtype"><option>Ground Station</option><option>Satellite</option><option>Organization</option><option>Contact</option></select><label>名称</label><input id="rname"><label>国家/城市</label><input id="rcity"><label>NORAD / 坐标 / 备注</label><input id="rmeta"><label>频段</label><input id="rband"><label>极化</label><input id="rpolar"><label>码率 Mbps</label><input id="rrate"><label>TLE Line 1</label><input id="rtle1"><label>TLE Line 2</label><input id="rtle2"><label>授权状态</label><select id="rauth"><option>Draft</option><option>Authorized</option><option>Not Authorized</option><option>Suspended</option></select><button class="btn ok" onclick="saveResource()">人工确认保存</button></div></div><div class="card" style="margin-top:14px"><h3>资源列表</h3>${resTable()}</div>`}
function structureResource(){let t=val('rawRes');document.getElementById('draftRes').innerHTML=`<div class="notice">AI 草稿：请人工核对后保存。<br>识别到可能信息：${t.slice(0,180)||'未输入'}...</div>`; if(t){document.getElementById('rname').value=t.split('\n')[0].slice(0,80);}}
function saveResource(){let type=val('rtype'), o={id:id(type.startsWith('Ground')?'STN':type.startsWith('Satellite')?'SAT':'ORG'),type,name:val('rname'),city:val('rcity'),meta:val('rmeta'),band:val('rband'),polar:val('rpolar'),rate:val('rrate'),tle1:val('rtle1'),tle2:val('rtle2'),auth:val('rauth')};confirmAction('保存资源草稿',()=>{if(type==='Ground Station')state.stations.push({...o,lat:o.meta.split(',')[0],lon:o.meta.split(',')[1]});else if(type==='Satellite')state.sats.push({...o,norad:o.meta});else state.orgs.push(o);})}
function resTable(){let all=[...state.stations,...state.sats,...state.orgs];return `<table><tr><th>类型</th><th>名称</th><th>状态</th><th>缺失检查</th><th>操作</th></tr>${all.map(o=>`<tr><td>${o.type}</td><td>${o.name||o.id}</td><td>${pill(o.auth||'Draft')}</td><td>${(o.type==='Satellite'?missing(o,['name','norad','tle1','tle2','band','polar','rate','auth']):o.type==='Ground Station'?missing(o,['name','lat','lon','band','polar','rate','auth']):missing(o,['name'])).join(', ')||'Ready'}</td><td><button class="btn secondary" onclick="archiveRes('${o.id}')">Archive</button></td></tr>`).join('')}</table>`}
function archiveRes(rid){confirmAction('归档资源 '+rid,()=>{['stations','sats','orgs'].forEach(k=>state[k]=state[k].filter(x=>x.id!==rid))})}
function renderSchedule(){document.getElementById('schedule').innerHTML=`<div class="notice">任务安排人工决定，AI 负责检查和推荐。</div><div class="card"><h3>Pass & Scheduling</h3><div class="row"><button class="btn" onclick="calcPasses()">计算过境窗口</button><button class="btn secondary" onclick="aiRecommendPass()">AI 推荐最佳窗口</button></div>${passTable()}</div>`}
function calcPasses(){confirmAction('计算过境窗口',()=>{state.passes=[];state.sats.forEach(s=>state.stations.forEach(st=>{let score=50+(s.band&&st.band&&s.band.toLowerCase()===st.band.toLowerCase()?25:0)+(s.polar&&st.polar&&s.polar.toLowerCase()===st.polar.toLowerCase()?15:0)+(s.tle1&&s.tle2?10:0);state.passes.push({id:id('PASS'),sat:s.id,station:st.id,start:'D+1 '+String(8+state.passes.length%10).padStart(2,'0')+':00 UTC',duration:'10 min',score,reason:score>=80?'Recommended':'Needs review'});}));})}
function aiRecommendPass(){let best=[...state.passes].sort((a,b)=>b.score-a.score)[0];alert(best?`AI 推荐：${best.id}\nScore: ${best.score}\n原因：${best.reason}\n仍需你人工确认是否创建任务。`:'请先计算过境窗口。')}
function passTable(){return `<table><tr><th>Pass</th><th>Satellite</th><th>Station</th><th>Start</th><th>Score</th><th>Action</th></tr>${state.passes.map(p=>`<tr><td>${p.id}</td><td>${p.sat}</td><td>${p.station}</td><td>${p.start}</td><td>${p.score}</td><td><button class="btn" onclick="createMission('${p.id}')">人工确认创建任务</button></td></tr>`).join('')}</table>`}
function createMission(pid){let p=state.passes.find(x=>x.id===pid);confirmAction('根据 '+pid+' 创建下行任务',()=>state.missions.push({id:id('MIS'),pass:pid,sat:p.sat,station:p.station,status:'New Request',type:'Test',customer:'',next:'确认配置'}))}
function renderMissions(){document.getElementById('missions').innerHTML=`<div class="card"><h3>Missions / 人工任务安排</h3>${missionTable()}</div>`}
function missionTable(){return `<table><tr><th>ID</th><th>Pass</th><th>Status</th><th>AI Check</th><th>Action</th></tr>${state.missions.map(m=>`<tr><td>${m.id}</td><td>${m.pass}</td><td>${pill(m.status)}</td><td>${missionCheck(m)}</td><td><button class="btn secondary" onclick="advanceMission('${m.id}')">推进状态</button> <button class="btn" onclick="draftReport('${m.id}')">AI 生成报告</button></td></tr>`).join('')}</table>`}
const flow=['New Request','Configuration Pending','Configured','Scheduled','In Pass','Signal Acquired','Data Captured','Transfer Waiting','Transfer Completed','Report Generated','Billable','Closed'];
function advanceMission(mid){confirmAction('推进任务状态 '+mid,()=>{let m=state.missions.find(x=>x.id===mid);m.status=flow[Math.min(flow.indexOf(m.status)+1,flow.length-1)]||'Configuration Pending'; if(m.status==='Configuration Pending'&&!state.configs.find(c=>c.mid===mid))state.configs.push({id:id('CFG'),mid,status:'Draft'}); if(m.status==='Signal Acquired'&&!state.receptions.find(r=>r.mid===mid))state.receptions.push({id:id('RF'),mid,signal:true,status:'Signal Detected'}); if(m.status==='Transfer Waiting'&&!state.transfers.find(t=>t.mid===mid))state.transfers.push({id:id('TRF'),mid,status:'Waiting',method:'SFTP'});})}
function missionCheck(m){let a=[];if(!state.configs.find(c=>c.mid===m.id))a.push('缺配置');if(['Transfer Waiting','Transfer Completed'].includes(m.status)&&!state.transfers.find(t=>t.mid===m.id))a.push('缺传输');return a.join(', ')||'Ready'}
function renderSimple(id,title,body){document.getElementById(id).innerHTML=`<div class="card"><h3>${title}</h3>${body}</div>`}
function renderConfig(){renderSimple('config','Configuration Check',`<div class="notice">人工确认配置，AI 检查缺失参数。</div><table><tr><th>ID</th><th>Mission</th><th>Status</th><th>Action</th></tr>${state.configs.map(c=>`<tr><td>${c.id}</td><td>${c.mid}</td><td>${pill(c.status)}</td><td><button class="btn ok" onclick="confirmAction('确认配置 '+ '${c.id}',()=>{state.configs.find(x=>x.id==='${c.id}').status='Owner Confirmed'})">人工确认</button></td></tr>`).join('')}</table>`)}
function renderReception(){renderSimple('reception','Reception Log',`<div class="notice">人工记录接收结果，AI 判断 Full / Partial / Test / Failure。</div><table><tr><th>ID</th><th>Mission</th><th>Result</th><th>AI Classification</th></tr>${state.receptions.map(r=>`<tr><td>${r.id}</td><td>${r.mid}</td><td>${r.status}</td><td>${r.signal?'Test Success / Need Data Check':'No Signal'}</td></tr>`).join('')}</table>`)}
function renderTransfer(){renderSimple('transfer','Transfer & Delivery',`<div class="notice">AI 准备交付清单，人工确认传输完成和厂家收到。</div><table><tr><th>ID</th><th>Mission</th><th>Status</th><th>Action</th></tr>${state.transfers.map(t=>`<tr><td>${t.id}</td><td>${t.mid}</td><td>${pill(t.status)}</td><td><button class="btn ok" onclick="completeTransfer('${t.id}')">人工确认交付完成</button></td></tr>`).join('')}</table>`)}
function completeTransfer(tid){confirmAction('确认传输完成 '+tid,()=>{let t=state.transfers.find(x=>x.id===tid);t.status='Operator Confirmed';let m=state.missions.find(x=>x.id===t.mid);m.status='Transfer Completed';state.bills.push({id:id('BIL'),mid:t.mid,status:'AI Recommended',amount:'',reason:'Transfer completed + operator confirmed = Billable'});})}
function draftReport(mid){confirmAction('AI 生成报告草稿 '+mid,()=>state.reports.push({id:id('REP'),mid,status:'Draft',body:`Mission ${mid} Report\nStatus checked by AI. Owner approval required before external use.`}))}
function renderReports(){renderSimple('reports','Reports',`<div class="notice">报告由 AI 生成，人工审核、修改、签字。</div><table><tr><th>ID</th><th>Mission</th><th>Status</th><th>Action</th></tr>${state.reports.map(r=>`<tr><td>${r.id}</td><td>${r.mid}</td><td>${pill(r.status)}</td><td><button class="btn secondary" onclick="copyText('${r.id}')">复制</button> <button class="btn ok" onclick="approveReport('${r.id}')">人工批准</button></td></tr>`).join('')}</table>`)}
function copyText(rid){let r=state.reports.find(x=>x.id===rid);navigator.clipboard?.writeText(r.body);alert('已复制报告文本')}
function approveReport(rid){confirmAction('批准报告 '+rid,()=>state.reports.find(x=>x.id===rid).status='Owner Approved')}
function renderBilling(){renderSimple('billing','Billing & Settlement',`<div class="notice">计费由 AI 推荐，人工确认金额、签字、开票、结算。</div><table><tr><th>ID</th><th>Mission</th><th>Status</th><th>AI Reason</th><th>Action</th></tr>${state.bills.map(b=>`<tr><td>${b.id}</td><td>${b.mid}</td><td>${pill(b.status)}</td><td>${b.reason}</td><td><button class="btn ok" onclick="approveBill('${b.id}')">人工确认计费</button></td></tr>`).join('')}</table>`)}
function approveBill(bid){confirmAction('确认计费 '+bid,()=>state.bills.find(x=>x.id===bid).status='Owner Approved')}
function renderEmail(){renderSimple('email','Email Drafts',`<div class="notice">邮件由 AI 起草，你确认收件人、附件和内容后再发送。</div><button class="btn" onclick="draftEmail()">AI 起草邮件</button><table><tr><th>ID</th><th>Subject</th><th>Status</th><th>Action</th></tr>${state.emails.map(e=>`<tr><td>${e.id}</td><td>${e.subject}</td><td>${pill(e.status)}</td><td><button class="btn secondary">Review</button> <button class="btn ok" onclick="confirmAction('确认可发送邮件 '+ '${e.id}',()=>{state.emails.find(x=>x.id==='${e.id}').status='Owner Ready To Send'})">人工确认可发送</button></td></tr>`).join('')}</table>`)}
function draftEmail(){confirmAction('AI 起草邮件',()=>state.emails.push({id:id('EML'),subject:'Mission Report / Delivery Confirmation',status:'Draft'}))}
function renderAI(){document.getElementById('ai').innerHTML=`<div class="split"><div class="card"><h3>AI Inspector</h3><div class="chat" id="chat"><div class="msg ai">你可以直接问：帮我检查今天该处理什么 / 这个任务能不能收费 / 帮我生成报告 / 帮我起草邮件。</div></div><textarea id="ask" placeholder="用中文输入你的问题"></textarea><button class="btn" onclick="askAI()">Ask AI</button></div><div class="card"><h3>AI 当前职责</h3><div class="notice">资源：AI 整理草稿，人工确认。</div><div class="notice">任务：人工安排，AI 检查。</div><div class="notice">报告/计费/邮件：AI 生成或推荐，人工确认签字和发送。</div></div></div>`}
function askPreset(q){show('ai',document.querySelectorAll('nav button')[10]);setTimeout(()=>{document.getElementById('ask').value=q;askAI()},50)}
function askAI(){let q=val('ask');let ans=''; if(q.includes('今天')||q.includes('检查'))ans=aiFindings().join('\n'); else if(q.includes('收费')||q.includes('计费'))ans='AI 建议：只有 Transfer Completed + Recipient Confirmed 后进入 Billable；最终金额和开票必须人工确认。'; else if(q.includes('报告'))ans='AI 可以生成报告草稿，人工审核后签字或发送。请选择任务后点击 AI 生成报告。'; else ans='我会先检查资源、任务、传输、计费和报告状态，然后给出下一步建议。';let c=document.getElementById('chat');c.innerHTML+=`<div class="msg user">${q}</div><div class="msg ai">${ans.replace(/\n/g,'<br>')}</div>`;document.getElementById('ask').value='';c.scrollTop=c.scrollHeight}
function renderSettings(){renderSimple('settings','Settings',`<div class="notice">默认设置：Resources = AI Draft + Owner Confirm；Missions = Manual + AI Check；Reports = AI Generate + Owner Approve；Billing = AI Recommend + Owner Confirm；Email = AI Draft + Owner Send。</div><button class="btn bad" onclick="confirmAction('清空全部本地数据',()=>{state={mode:'AI Assist',orgs:[],contacts:[],stations:[],sats:[],passes:[],missions:[],configs:[],receptions:[],transfers:[],reports:[],bills:[],emails:[],audit:[]}})">Reset Local Data</button><h3>Audit</h3><table><tr><th>Time</th><th>Action</th></tr>${state.audit.slice(0,30).map(a=>`<tr><td>${a.time}</td><td>${a.action}</td></tr>`).join('')}</table>`)}
function renderAll(){document.getElementById('mode').value=state.mode;renderToday();renderResources();renderSchedule();renderMissions();renderConfig();renderReception();renderTransfer();renderReports();renderBilling();renderEmail();renderAI();renderSettings()}nav();renderAll();
</script>
</body>
