<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GS LinkOps AI Full Platform</title><style>:root{--bg:#06101d;--panel:#0d1b31;--panel2:#10243d;--line:#2b4664;--text:#edf7ff;--muted:#9eb6cf;--cyan:#44ddff;--green:#7cf0b2;--amber:#ffd166;--red:#ff6b78;--blue:#6fb6ff;--purple:#bca7ff}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 10% 0,#143a65 0,#06101d 44%,#040913 100%);color:var(--text);font-family:Inter,Arial,sans-serif}button,input,select,textarea{font:inherit}.shell{display:grid;grid-template-columns:292px 1fr;min-height:100vh}.side{height:100vh;position:sticky;top:0;overflow:auto;background:#071426;border-right:1px solid var(--line);padding:22px}.brand{display:flex;gap:12px;align-items:center;margin-bottom:18px}.logo{width:46px;height:46px;border-radius:15px;background:linear-gradient(135deg,var(--cyan),var(--green));display:grid;place-items:center;color:#06101c;font-weight:1000;box-shadow:0 0 28px #44ddff55}.brand b{font-size:18px}.brand span{display:block;color:var(--muted);font-size:12px;margin-top:3px}.tag{display:inline-flex;border:1px solid #315072;background:#0b1d33;color:#b8d5ef;border-radius:999px;padding:6px 9px;font-size:11px;font-weight:900}.nav{margin-top:16px}.nav button{width:100%;text-align:left;border:1px solid transparent;background:transparent;color:#cfe3f8;border-radius:14px;padding:10px 12px;margin:3px 0;cursor:pointer;font-weight:800}.nav button:hover,.nav button.active{border-color:#315072;background:#132844;color:#fff}.main{padding:24px 28px 40px;max-width:1600px;width:100%;margin:0 auto}.topbar{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:20px}.title h1{margin:0;font-size:30px}.title p{margin:7px 0 0;color:var(--muted);line-height:1.45}.actions{display:flex;gap:10px;flex-wrap:wrap}.btn{border:1px solid #315072;background:#132844;color:#e9f6ff;border-radius:12px;padding:9px 12px;cursor:pointer;font-weight:900}.btn.primary{background:linear-gradient(135deg,var(--cyan),var(--green));color:#06101c;border:0}.btn.danger{border-color:#8c3440;color:#ffd6da}.grid{display:grid;gap:16px}.cards{grid-template-columns:repeat(4,minmax(0,1fr))}.two{grid-template-columns:1.08fr .92fr}.three{grid-template-columns:repeat(3,1fr)}.four{grid-template-columns:repeat(4,1fr)}.section,.card{border:1px solid var(--line);background:linear-gradient(180deg,#10213a,#0a172b);border-radius:22px;padding:18px;box-shadow:0 18px 40px #0005}.section h2{font-size:20px;margin:0 0 12px}.section h3{font-size:15px;margin:12px 0 10px}.card small{color:var(--muted);line-height:1.4}.num{font-size:34px;font-weight:1000;margin:5px 0}.muted{color:var(--muted)}.pill{display:inline-block;border-radius:999px;padding:5px 8px;font-size:11px;font-weight:1000;border:1px solid}.ok{color:#caffdf;background:#0d3026;border-color:#2b8b61}.pending{color:#ffe8a8;background:#2f260f;border-color:#8c6e22}.info{color:#cce9ff;background:#102b4b;border-color:#3471aa}.bad{color:#ffd6da;background:#33141b;border-color:#8c3440}.purple{color:#ebddff;background:#261c44;border-color:#6952a8}.table{width:100%;border-collapse:separate;border-spacing:0 8px}.table th{font-size:12px;text-align:left;color:#8faac5;padding:0 10px}.table td{background:#0f223b;border-top:1px solid #294765;border-bottom:1px solid #294765;padding:11px 10px;font-size:13px;vertical-align:top}.table td:first-child{border-left:1px solid #294765;border-radius:13px 0 0 13px}.table td:last-child{border-right:1px solid #294765;border-radius:0 13px 13px 0}.empty{border:1px dashed #45627e;background:#0b1b31;border-radius:18px;padding:18px;color:#c7d8e8;line-height:1.55}.fieldgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.field{display:grid;gap:5px}.field label{font-size:12px;color:#9fb4cb;font-weight:900}.field input,.field select,.field textarea{background:#08182d;border:1px solid #315072;color:#fff;border-radius:12px;padding:9px;min-width:0}.field textarea{min-height:76px}.alert{border:1px solid #315072;background:#0e2038;border-radius:16px;padding:12px;line-height:1.45;font-size:13px;margin-bottom:10px}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}.hidden{display:none!important}.footer{margin-top:18px;color:#7892ad;font-size:12px;line-height:1.45}.copilot{background:linear-gradient(135deg,#132844,#101936 55%,#0b1a2e);border-color:#45679a}.score{height:8px;background:#06101f;border-radius:999px;overflow:hidden;border:1px solid #27405f}.score div{height:100%;background:linear-gradient(90deg,var(--red),var(--amber),var(--green))}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}.workflow{display:grid;grid-template-columns:repeat(8,1fr);gap:8px}.step{border:1px solid #315072;background:#0b1d33;border-radius:16px;padding:11px;min-height:76px}.step b{font-size:12px}.step span{display:block;color:#9fb4cb;font-size:11px;margin-top:7px}@media(max-width:1180px){.shell{grid-template-columns:1fr}.side{position:relative;height:auto}.cards,.two,.three,.four,.fieldgrid,.workflow{grid-template-columns:1fr}}</style></head><body><div class="shell"><aside class="side"><div class="brand"><div class="logo">GS</div><div><b>GS LinkOps AI</b><span>Full platform prototype</span></div></div><div class="tag">complete shell · no seed resources</div><nav class="nav" id="nav"></nav><p class="footer">完整平台框架已放入：资源、轨道、调度、任务、配置、RF、传输、计费、报告、门户、治理、系统设置。资源为空，等统一资源包再录入。</p></aside><main class="main"><div class="topbar"><div class="title"><h1 id="pageTitle"></h1><p id="pageDesc"></p></div><div class="actions"><button class="btn" onclick="exportData()">Export JSON</button><button class="btn" onclick="document.getElementById('importFile').click()">Import JSON</button><button class="btn danger" onclick="resetAll()">Reset</button><input id="importFile" type="file" accept="application/json" style="display:none" onchange="importData(event)"></div></div><section id="dashboard" class="view"></section><section id="resources" class="view hidden"></section><section id="orbit" class="view hidden"></section><section id="scheduling" class="view hidden"></section><section id="missions" class="view hidden"></section><section id="config" class="view hidden"></section><section id="rf" class="view hidden"></section><section id="transfer" class="view hidden"></section><section id="billing" class="view hidden"></section><section id="reports" class="view hidden"></section><section id="portals" class="view hidden"></section><section id="governance" class="view hidden"></section><section id="copilot" class="view hidden"></section><section id="settings" class="view hidden"></section></main></div><script>const blank={orgs:[],contacts:[],stations:[],sats:[],passes:[],missions:[],configs:[],rf:[],transfers:[],billing:[],reports:[],audit:[],settings:{billingTrigger:'Transfer Completed + Manufacturer Confirmed',orbitMode:'Simplified estimator in frontend; production mode requires SGP4/Skyfield backend'}};let db=JSON.parse(localStorage.getItem('gsLinkOpsAIFull')||'null')||structuredClone(blank);let active='dashboard';const pages={dashboard:['Command Dashboard','完整系统中控：所有模块保留，按需要启用。'],resources:['Resource Center','机构、联系人、卫星、地面站、能力参数。'],orbit:['Orbit Engine','TLE/NORAD、轨道记录、可见窗口/过境计算模块。'],scheduling:['Scheduling Center','能力矩阵、窗口推荐、冲突检查、任务生成。'],missions:['Mission Control','下行任务、状态流转、执行闭环。'],config:['Configuration Center','站端配置、频率、极化、调制、编码、帧格式。'],rf:['RF & Reception Monitor','信号捕获、载波锁定、解调、帧同步、数据捕获。'],transfer:['Transfer Center','数据回传链路、manifest、checksum、厂家确认、保留/删除。'],billing:['Billing Center','计费规则、客户账单、供应商结算、毛利。'],reports:['Report Center','任务报告、传输报告、计费报告、失败分析报告。'],portals:['Partner Portals','地面站门户、卫星方门户、客户门户、API 接入。'],governance:['Governance & Audit','权限、角色、审批、审计、敏感参数控制。'],copilot:['AI Copilot','智能检查、推荐、风险、失败分析、报告辅助。'],settings:['System Settings','系统参数、编号规则、触发条件、导入导出。']};function audit(a){db.audit.unshift({time:new Date().toISOString(),action:a});localStorage.setItem('gsLinkOpsAIFull',JSON.stringify(db))}function save(a='update'){audit(a);renderAll()}function uid(p){return p+'-'+Date.now().toString(36).slice(-6)+'-'+Math.random().toString(36).slice(2,5).toUpperCase()}function nav(){document.getElementById('nav').innerHTML=Object.keys(pages).map(k=>`<button class="${active===k?'active':''}" onclick="show('${k}')">${pages[k][0]}</button>`).join('')}function show(k){active=k;document.querySelectorAll('.view').forEach(v=>v.classList.add('hidden'));document.getElementById(k).classList.remove('hidden');document.getElementById('pageTitle').textContent=pages[k][0];document.getElementById('pageDesc').textContent=pages[k][1];nav();renderAll()}function val(id){return document.getElementById(id)?.value?.trim()||''}function pill(v,c='info'){return `<span class="pill ${c}">${v}</span>`}function empty(t,b){return `<div class="empty"><b>${t}</b><br>${b}</div>`}function opts(arr){return arr.map(x=>`<option value="${x.id}">${x.name||x.id}</option>`).join('')}function addOrg(){db.orgs.push({id:uid('ORG'),name:val('orgName'),type:val('orgType'),country:val('orgCountry'),notes:val('orgNotes')});save('add organization')}function addContact(){db.contacts.push({id:uid('CON'),name:val('contactName'),org:val('contactOrg'),role:val('contactRole'),email:val('contactEmail'),phone:val('contactPhone')});save('add contact')}function addStation(){db.stations.push({id:val('stId')||uid('STN'),name:val('stName'),org:val('stOrg'),country:val('stCountry'),lat:+val('stLat')||0,lon:+val('stLon')||0,alt:+val('stAlt')||0,antenna:val('stAntenna'),band:val('stBand'),freq:val('stFreq'),polar:val('stPolar'),minEl:+val('stMinEl')||10,maxRate:+val('stRate')||0,demod:val('stDemod'),transfer:val('stTransfer'),status:val('stStatus'),cost:+val('stCost')||0});save('add station')}function addSat(){db.sats.push({id:val('satId')||uid('SAT'),name:val('satName'),org:val('satOrg'),norad:val('satNorad'),tle1:val('satTle1'),tle2:val('satTle2'),band:val('satBand'),freq:val('satFreq'),polar:val('satPolar'),mod:val('satMod'),coding:val('satCoding'),rate:+val('satRate')||0,frame:val('satFrame'),status:val('satStatus')});save('add satellite')}function del(type,id){db[type]=db[type].filter(x=>x.id!==id);save('delete '+type)}function obj(type,id){return db[type].find(x=>x.id===id)||{}}function name(type,id){let x=obj(type,id);return x.name||id}function table(arr,cols,type){if(!arr.length)return empty('No records','等待统一资源包录入。');return `<table class="table"><tr>${cols.map(c=>`<th>${c}</th>`).join('')}<th>Action</th></tr>${arr.map(r=>`<tr>${cols.map(c=>`<td>${r[c]||''}</td>`).join('')}<td><button class="btn danger" onclick="del('${type}','${r.id}')">Delete</button></td></tr>`).join('')}</table>`}function renderDashboard(){let counts=[['Organizations',db.orgs.length],['Stations',db.stations.length],['Satellites',db.sats.length],['Missions',db.missions.length]];document.getElementById('dashboard').innerHTML=`<div class="grid cards">${counts.map(c=>`<div class="card"><small>${c[0]}</small><div class="num">${c[1]}</div><small>${c[0]==='Stations'?'ground resources':c[0]==='Satellites'?'space resources':'platform objects'}</small></div>`).join('')}</div><div class="section" style="margin-top:16px"><h2>Complete Platform Map</h2><div class="workflow">${Object.keys(pages).filter(k=>k!=='dashboard').map(k=>`<div class="step"><b>${pages[k][0]}</b><span>${moduleState(k)}</span></div>`).join('')}</div></div><div class="grid two" style="margin-top:16px"><div class="section"><h2>End-to-End Flow</h2><div class="alert">Resource Intake → Orbit Engine → Capability Match → Scheduling → Mission Control → Configuration → RF Monitor → Transfer → Billing → Report → Audit</div></div><div class="section copilot"><h2>AI Alerts</h2>${aiAlerts().slice(0,6).map(a=>`<div class="alert">${a}</div>`).join('')}</div></div>`}function moduleState(k){if(k==='resources')return db.stations.length||db.sats.length?'Active':'Ready / empty';if(k==='orbit')return db.passes.length?'Passes calculated':'Engine ready';if(k==='missions')return db.missions.length?'Active':'Ready';if(k==='transfer')return db.transfers.length?'Active':'Ready';if(k==='billing')return db.billing.length?'Active':'Ready';return 'Available'}function renderResources(){let orgOptions=opts(db.orgs);document.getElementById('resources').innerHTML=`<div class="grid two"><div class="section"><h2>Add Organization</h2><div class="fieldgrid"><div class="field"><label>Name</label><input id="orgName"></div><div class="field"><label>Type</label><select id="orgType"><option>Satellite Operator</option><option>Ground Station Partner</option><option>Manufacturer</option><option>Customer</option><option>Supplier</option><option>Internal Entity</option></select></div><div class="field"><label>Country</label><input id="orgCountry"></div><div class="field"><label>Notes</label><input id="orgNotes"></div></div><br><button class="btn primary" onclick="addOrg()">Add Organization</button></div><div class="section"><h2>Add Contact</h2><div class="fieldgrid"><div class="field"><label>Name</label><input id="contactName"></div><div class="field"><label>Organization</label><select id="contactOrg">${orgOptions}</select></div><div class="field"><label>Role</label><input id="contactRole"></div><div class="field"><label>Email</label><input id="contactEmail"></div><div class="field"><label>Phone</label><input id="contactPhone"></div></div><br><button class="btn primary" onclick="addContact()">Add Contact</button></div></div><div class="grid two" style="margin-top:16px"><div class="section"><h2>Add Ground Station</h2>${stationForm(orgOptions)}<button class="btn primary" onclick="addStation()">Add Ground Station</button></div><div class="section"><h2>Add Satellite</h2>${satForm(orgOptions)}<button class="btn primary" onclick="addSat()">Add Satellite</button></div></div><div class="grid two" style="margin-top:16px"><div class="section"><h2>Ground Stations</h2>${table(db.stations,['id','name','country','band','status'],'stations')}</div><div class="section"><h2>Satellites</h2>${table(db.sats,['id','name','norad','band','status'],'sats')}</div></div><div class="grid two" style="margin-top:16px"><div class="section"><h2>Organizations</h2>${table(db.orgs,['name','type','country'],'orgs')}</div><div class="section"><h2>Contacts</h2>${table(db.contacts,['name','role','email'],'contacts')}</div></div>`}function stationForm(o){let f=['stId|Station ID','stName|Name','stOrg|Organization','stCountry|Country / City','stLat|Latitude','stLon|Longitude','stAlt|Altitude m','stAntenna|Antenna / Diameter','stBand|Supported Band','stFreq|Frequency Range','stPolar|Polarization','stMinEl|Minimum Elevation','stRate|Max Data Rate Mbps','stDemod|Demodulator / Modem','stCost|Cost per pass USD'];return `<div class="fieldgrid">${f.map(x=>{let [id,l]=x.split('|');return id==='stOrg'?`<div class="field"><label>${l}</label><select id="${id}">${o}</select></div>`:`<div class="field"><label>${l}</label><input id="${id}"></div>`}).join('')}<div class="field"><label>Transfer Method</label><select id="stTransfer"><option>SFTP</option><option>FTP</option><option>S3</option><option>VPN</option><option>Dedicated Server</option></select></div><div class="field"><label>Status</label><select id="stStatus"><option>Draft</option><option>Onboarding</option><option>Authorized</option><option>Suspended</option></select></div></div><br>`}function satForm(o){let f=['satId|Satellite ID','satName|Name','satOrg|Organization','satNorad|NORAD ID','satTle1|TLE Line 1','satTle2|TLE Line 2','satBand|Band','satFreq|Downlink Frequency','satPolar|Polarization','satMod|Modulation','satCoding|Coding','satRate|Data Rate Mbps','satFrame|Frame Format'];return `<div class="fieldgrid">${f.map(x=>{let [id,l]=x.split('|');return id==='satOrg'?`<div class="field"><label>${l}</label><select id="${id}">${o}</select></div>`:`<div class="field"><label>${l}</label><input id="${id}"></div>`}).join('')}<div class="field"><label>Status</label><select id="satStatus"><option>Draft</option><option>Authorized</option><option>Testing</option><option>Suspended</option></select></div></div><br>`}function parseTle(sa){let mm=0,inc=0;if(sa.tle2&&sa.tle2.length>60){inc=parseFloat(sa.tle2.slice(8,16))||0;mm=parseFloat(sa.tle2.slice(52,63))||0}return{inc,mm,period:mm?1440/mm:0}}function calcPasses(){db.passes=[];db.sats.forEach((sa,si)=>db.stations.forEach((st,gi)=>{let o=parseTle(sa),seed=(parseInt(sa.norad||'10000')+Math.round(Math.abs((st.lat||0)*100))+gi*89+si*53)%720;let h=String(Math.floor(seed/60)).padStart(2,'0'),m=String(seed%60).padStart(2,'0');let duration=Math.max(5,Math.min(18,Math.round((o.period||95)/10)+gi));let elev=Math.max(st.minEl||10,Math.min(87,20+(Math.abs(st.lat||0)%50)+((o.inc||30)%20)));let match=matches(sa,st);db.passes.push({id:uid('PASS'),sat:sa.id,station:st.id,start:`D+1 ${h}:${m} UTC`,end:`+${duration} min`,maxEl:Math.round(elev),score:match.score,match:match.match,reason:match.reason,mode:o.mm?'TLE parsed / simplified estimator':'No TLE / planning placeholder'})}));save('calculate passes')}function renderOrbit(){document.getElementById('orbit').innerHTML=`<div class="section"><h2>Orbit / Pass Engine</h2><div class="alert"><b>Included now:</b> TLE fields, NORAD field, pass/contact window calculation action, parsed TLE mean motion/period display, station coordinate dependency, minimum elevation dependency. <br><b>Production upgrade:</b> replace the frontend simplified estimator with Python Skyfield / SGP4 backend for official orbit propagation.</div><button class="btn primary" onclick="calcPasses()">Calculate Pass Windows</button></div><div class="section" style="margin-top:16px"><h2>Orbit Records</h2>${db.sats.length?`<table class="table"><tr><th>Satellite</th><th>NORAD</th><th>TLE Status</th><th>Inclination</th><th>Period</th></tr>${db.sats.map(s=>{let o=parseTle(s);return `<tr><td>${s.name||s.id}</td><td>${s.norad||''}</td><td>${s.tle1&&s.tle2?pill('TLE provided','ok'):pill('Missing TLE','pending')}</td><td>${o.inc||'-'}</td><td>${o.period?o.period.toFixed(1)+' min':'-'}</td></tr>`}).join('')}</table>`:empty('No satellites','Add satellite records first.')}</div><div class="section" style="margin-top:16px"><h2>Calculated Pass Windows</h2>${passTable()}</div>`}function matches(sa,st){let reasons=[],score=30;if(st.status==='Authorized')score+=15;else reasons.push('station not Authorized');if(sa.status==='Authorized'||sa.status==='Testing')score+=15;else reasons.push('satellite not Authorized/Testing');if(st.band&&sa.band&&st.band.toLowerCase().includes(sa.band.toLowerCase().split('/')[0].trim()))score+=15;else reasons.push('band confirmation required');if(!sa.rate||!st.maxRate||st.maxRate>=sa.rate)score+=10;else reasons.push('data rate exceeds station capacity');if(st.polar&&sa.polar&&st.polar.toLowerCase().includes(sa.polar.toLowerCase().split('/')[0].trim()))score+=10;else reasons.push('polarization confirmation required');if(st.lat||st.lon)score+=10;else reasons.push('station coordinates missing');if(sa.tle1&&sa.tle2)score+=5;else reasons.push('TLE missing');return{score:Math.min(100,score),match:score>=80?'Matched':score>=55?'Conditional':'Need Review',reason:reasons.join('; ')||'ready'}}function passTable(){if(!db.passes.length)return empty('No pass windows','Click Calculate Pass Windows after adding at least one satellite and station.');return `<table class="table"><tr><th>Satellite</th><th>Station</th><th>Window</th><th>Max Elev.</th><th>Score</th><th>Mode</th></tr>${db.passes.map(p=>`<tr><td>${name('sats',p.sat)}</td><td>${name('stations',p.station)}</td><td>${p.start} / ${p.end}</td><td>${p.maxEl}°</td><td><div class="score"><div style="width:${p.score}%"></div></div>${p.score}/100 ${pill(p.match,p.match==='Matched'?'ok':'pending')}</td><td>${p.mode}</td></tr>`).join('')}</table>`}function renderScheduling(){document.getElementById('scheduling').innerHTML=`<div class="section"><h2>Scheduling / Capability Matrix</h2>${db.passes.length?`<table class="table"><tr><th>Satellite</th><th>Station</th><th>Recommended Window</th><th>Readiness</th><th>Reason</th><th>Action</th></tr>${db.passes.sort((a,b)=>b.score-a.score).map(p=>`<tr><td>${name('sats',p.sat)}</td><td>${name('stations',p.station)}</td><td>${p.start} / ${p.end}</td><td>${pill(p.match,p.match==='Matched'?'ok':'pending')}</td><td>${p.reason}</td><td><button class="btn primary" onclick="createMission('${p.id}')">Create Mission</button></td></tr>`).join('')}</table>`:empty('No planning output','Use Orbit Engine to calculate pass windows first.')}</div><div class="section" style="margin-top:16px"><h2>Conflict Check</h2>${empty('Conflict engine available','When multiple missions share the same station/time window, the platform will mark conflict here. Current prototype checks framework only.')}</div>`}function createMission(pid){let p=db.passes.find(x=>x.id===pid);let seq=String(db.missions.length+1).padStart(4,'0');let id=`GS-DL-${new Date().getFullYear()}-${seq}`;db.missions.push({id,sat:p.sat,station:p.station,pass:pid,window:p.start+' / '+p.end,status:'New Request',billing:'Hold'});save('create mission');show('missions')}function nextStatus(id){let flow=['New Request','Auto Matched','Station Confirmed','Configuration Pending','Configured','Scheduled','In Pass','Signal Acquired','Carrier Locked','Demod Locked','Frame Synced','Data Captured','Transfer Waiting','Transfer Started','Transfer Completed','Manufacturer Confirmed','Report Generated','Billable','Closed'];let m=db.missions.find(x=>x.id===id);m.status=flow[Math.min(flow.indexOf(m.status)+1,flow.length-1)]||'Auto Matched';if(m.status==='Configuration Pending'&&!db.configs.find(c=>c.mission===id))db.configs.push({id:uid('CFG'),mission:id,freq:'',ifFreq:'',mod:'',coding:'',rate:'',polar:'',sync:'',frame:'',confirmed:false});if(['Signal Acquired','Carrier Locked','Demod Locked','Frame Synced','Data Captured'].includes(m.status)&&!db.rf.find(r=>r.mission===id))db.rf.push({id:uid('RF'),mission:id,signal:m.status,snr:'',cn0:'',size:'',issues:''});if(m.status==='Transfer Waiting'&&!db.transfers.find(t=>t.mission===id))db.transfers.push({id:uid('TRF'),mission:id,method:obj('stations',m.station).transfer||'SFTP',status:'Waiting for File',manifest:'',size:'',checksum:'',dest:'',confirmed:false});if(m.status==='Billable'&&!db.billing.find(b=>b.mission===id))createBilling(id,false);save('advance mission')}function renderMissions(){document.getElementById('missions').innerHTML=`<div class="section"><h2>Downlink Missions</h2>${db.missions.length?`<table class="table"><tr><th>ID</th><th>Satellite</th><th>Station</th><th>Window</th><th>Status</th><th>Action</th></tr>${db.missions.map(m=>`<tr><td class="mono">${m.id}</td><td>${name('sats',m.sat)}</td><td>${name('stations',m.station)}</td><td>${m.window}</td><td>${pill(m.status,m.status==='Closed'?'ok':m.status.includes('Failed')?'bad':'info')}</td><td><button class="btn" onclick="nextStatus('${m.id}')">Advance</button></td></tr>`).join('')}</table>`:empty('No missions','Create a mission from Scheduling Center.')}</div>`}function renderConfig(){document.getElementById('config').innerHTML=`<div class="section"><h2>Station Configuration Profiles</h2>${db.configs.length?`<table class="table"><tr><th>Mission</th><th>Frequency</th><th>Mod/Coding</th><th>Rate</th><th>Sync/Frame</th><th>Status</th></tr>${db.configs.map(c=>`<tr><td>${c.mission}</td><td><input value="${c.freq}" onchange="edit('configs','${c.id}','freq',this.value)" placeholder="frequency"><br><input value="${c.ifFreq}" onchange="edit('configs','${c.id}','ifFreq',this.value)" placeholder="IF"></td><td><input value="${c.mod}" onchange="edit('configs','${c.id}','mod',this.value)" placeholder="modulation"><br><input value="${c.coding}" onchange="edit('configs','${c.id}','coding',this.value)" placeholder="coding"></td><td><input value="${c.rate}" onchange="edit('configs','${c.id}','rate',this.value)"></td><td><input value="${c.sync}" onchange="edit('configs','${c.id}','sync',this.value)" placeholder="sync"><br><input value="${c.frame}" onchange="edit('configs','${c.id}','frame',this.value)" placeholder="frame"></td><td>${pill(c.confirmed?'Confirmed':'Pending',c.confirmed?'ok':'pending')}<br><button class="btn" onclick="confirmConfig('${c.id}')">Confirm</button></td></tr>`).join('')}</table>`:empty('No configuration profiles','Advance a mission to Configuration Pending to create a profile.')}</div>`}function edit(type,id,k,v){db[type].find(x=>x.id===id)[k]=v;localStorage.setItem('gsLinkOpsAIFull',JSON.stringify(db))}function confirmConfig(id){db.configs.find(x=>x.id===id).confirmed=true;save('confirm config')}function renderRf(){document.getElementById('rf').innerHTML=`<div class="section"><h2>RF / Reception Monitor</h2>${db.rf.length?`<table class="table"><tr><th>Mission</th><th>Signal State</th><th>SNR</th><th>C/N0</th><th>Data Size</th><th>Issues</th></tr>${db.rf.map(r=>`<tr><td>${r.mission}</td><td><select onchange="edit('rf','${r.id}','signal',this.value)">${['Signal Acquired','Carrier Locked','Demod Locked','Frame Synced','Data Captured','Failed'].map(x=>`<option ${r.signal===x?'selected':''}>${x}</option>`)}</select></td><td><input value="${r.snr}" onchange="edit('rf','${r.id}','snr',this.value)"></td><td><input value="${r.cn0}" onchange="edit('rf','${r.id}','cn0',this.value)"></td><td><input value="${r.size}" onchange="edit('rf','${r.id}','size',this.value)"></td><td><input value="${r.issues}" onchange="edit('rf','${r.id}','issues',this.value)"></td></tr>`).join('')}</table>`:empty('No RF logs','Advance a mission into signal/reception states to create RF logs.')}</div>`}function completeTransfer(id){let t=db.transfers.find(x=>x.id===id);t.status='Transfer Completed';t.confirmed=true;createBilling(t.mission,false);save('complete transfer')}function createBilling(mid,doSave=true){if(db.billing.find(b=>b.mission===mid))return;let m=db.missions.find(x=>x.id===mid),st=obj('stations',m.station);let cost=+st.cost||0;db.billing.push({id:uid('BIL'),mission:mid,mode:'Per successful downlink',cost,price:cost+1000,status:'Billable'});if(doSave)save('create billing')}function renderTransfer(){document.getElementById('transfer').innerHTML=`<div class="section"><h2>Transfer Jobs</h2>${db.transfers.length?`<table class="table"><tr><th>Mission</th><th>Method</th><th>Destination</th><th>Manifest</th><th>Checksum</th><th>Status</th><th>Action</th></tr>${db.transfers.map(t=>`<tr><td>${t.mission}</td><td>${t.method}</td><td><input value="${t.dest}" onchange="edit('transfers','${t.id}','dest',this.value)"></td><td><input value="${t.manifest}" onchange="edit('transfers','${t.id}','manifest',this.value)"><br><input value="${t.size}" onchange="edit('transfers','${t.id}','size',this.value)" placeholder="total size"></td><td><input value="${t.checksum}" onchange="edit('transfers','${t.id}','checksum',this.value)"></td><td>${pill(t.status,t.confirmed?'ok':'pending')}</td><td><button class="btn primary" onclick="completeTransfer('${t.id}')">Complete</button></td></tr>`).join('')}</table>`:empty('No transfer jobs','Advance a mission to Transfer Waiting.')}</div>`}function renderBilling(){document.getElementById('billing').innerHTML=`<div class="section"><h2>Billing Records</h2>${db.billing.length?`<table class="table"><tr><th>Mission</th><th>Mode</th><th>Station Cost</th><th>Client Price</th><th>Margin</th><th>Status</th></tr>${db.billing.map(b=>`<tr><td>${b.mission}</td><td>${b.mode}</td><td>USD ${b.cost}</td><td>USD ${b.price}</td><td>USD ${b.price-b.cost}</td><td>${pill(b.status,'ok')}</td></tr>`).join('')}</table>`:empty('No billing records','Billing is generated when transfer/manufacturer confirmation is completed.')}</div><div class="section" style="margin-top:16px"><h2>Pricing Rule Templates</h2><div class="grid three">${['Per pass','Per minute','Per successful downlink','Per test mission','Cost plus service fee','Monthly package'].map(x=>`<div class="alert"><b>${x}</b><br>Available rule template.</div>`).join('')}</div></div>`}function renderReports(){document.getElementById('reports').innerHTML=`<div class="section"><h2>Auto Reports</h2>${db.missions.length?db.missions.map(m=>`<div class="alert"><b>${m.id}</b><br>${report(m)}<br><button class="btn" onclick="navigator.clipboard.writeText(reportById('${m.id}'))">Copy</button></div>`).join(''):empty('No reports','Reports generate after missions exist.')}</div>`}function reportById(id){return report(db.missions.find(m=>m.id===id))}function report(m){let tr=db.transfers.find(t=>t.mission===m.id),b=db.billing.find(b=>b.mission===m.id),cfg=db.configs.find(c=>c.mission===m.id),rf=db.rf.find(r=>r.mission===m.id);return `Mission ${m.id}: ${name('sats',m.sat)} via ${name('stations',m.station)}. Window: ${m.window}. Status: ${m.status}. Config: ${cfg&&cfg.confirmed?'confirmed':'pending/not created'}. RF: ${rf?rf.signal:'not recorded'}. Transfer: ${tr?tr.status:'not created'}. Billing: ${b?b.status:'not billable yet'}.`}function renderPortals(){document.getElementById('portals').innerHTML=`<div class="section"><h2>Partner Portals</h2><div class="grid three">${['Satellite Operator Portal','Ground Station Partner Portal','Customer Portal','API Access','Station Confirmation Link','Report Delivery Link'].map(x=>`<div class="alert"><b>${x}</b><br>Module reserved and visible. Backend integration can be activated later.</div>`).join('')}</div></div>`}function renderGovernance(){document.getElementById('governance').innerHTML=`<div class="grid two"><div class="section"><h2>Roles & Permissions</h2><table class="table"><tr><th>Role</th><th>Access</th></tr>${['Admin','Operations Manager','Technical User','Commercial User','Station Partner','Satellite Operator','Read-only User'].map(r=>`<tr><td>${r}</td><td>Template available for RBAC backend.</td></tr>`).join('')}</table></div><div class="section"><h2>Audit Logs</h2>${db.audit.length?db.audit.slice(0,20).map(a=>`<div class="alert"><b>${a.action}</b><br>${a.time}</div>`).join(''):empty('No audit records','Actions will be logged here.')}</div></div>`}function renderCopilot(){document.getElementById('copilot').innerHTML=`<div class="grid two"><div class="section copilot"><h2>AI Copilot Alerts</h2>${aiAlerts().map(a=>`<div class="alert">${a}</div>`).join('')}</div><div class="section"><h2>Best Recommendation</h2><div class="alert">${best()}</div><h2>Failure Categories</h2><div class="grid two">${['Visibility Issue','Station Tracking Issue','RF Parameter Issue','Carrier Lock Issue','Demodulation Issue','Frame Sync Issue','Transfer Issue','Manufacturer Confirmation Issue'].map(x=>`<div class="alert">${x}</div>`).join('')}</div></div></div>`}function renderSettings(){document.getElementById('settings').innerHTML=`<div class="section"><h2>System Settings</h2><div class="fieldgrid"><div class="field"><label>Billing Trigger</label><input value="${db.settings.billingTrigger}" onchange="db.settings.billingTrigger=this.value;save('update billing trigger')"></div><div class="field"><label>Orbit Mode</label><input value="${db.settings.orbitMode}" onchange="db.settings.orbitMode=this.value;save('update orbit mode')"></div></div></div><div class="section" style="margin-top:16px"><h2>Data Controls</h2><button class="btn" onclick="exportData()">Export JSON</button> <button class="btn" onclick="document.getElementById('importFile').click()">Import JSON</button> <button class="btn danger" onclick="resetAll()">Reset</button></div>`}function aiAlerts(){let a=[];if(!db.orgs.length)a.push('<b>Governance:</b> no organizations added.');if(!db.stations.length)a.push('<b>Resource:</b> no ground stations added.');if(!db.sats.length)a.push('<b>Resource:</b> no satellites added.');db.sats.forEach(s=>{if(!s.tle1||!s.tle2)a.push(`<b>${s.name||s.id}:</b> TLE missing, official pass calculation not ready.`);if(!s.band||!s.polar)a.push(`<b>${s.name||s.id}:</b> downlink band/polarization incomplete.`)});db.stations.forEach(s=>{if(!s.lat&&!s.lon)a.push(`<b>${s.name||s.id}:</b> station coordinates missing.`);if(s.status!=='Authorized')a.push(`<b>${s.name||s.id}:</b> station not marked Authorized.`)});db.missions.forEach(m=>{if(m.status==='Transfer Waiting')a.push(`<b>${m.id}:</b> transfer pending before billing.`)});return a.length?a:['<b>Ready:</b> no major platform alerts detected.']}function best(){let p=[...db.passes].sort((a,b)=>b.score-a.score)[0];if(!p)return 'Calculate pass windows after resources are added.';return `Best current option: ${name('sats',p.sat)} via ${name('stations',p.station)}. Score ${p.score}/100. Status: ${p.match}. Reason: ${p.reason}.`}function exportData(){let blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='gs-linkops-ai-full-data.json';a.click()}function importData(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{db=JSON.parse(r.result);save('import data')};r.readAsText(f)}function resetAll(){if(confirm('Clear all local platform data?')){db=structuredClone(blank);save('reset all')}}function renderAll(){renderDashboard();renderResources();renderOrbit();renderScheduling();renderMissions();renderConfig();renderRf();renderTransfer();renderBilling();renderReports();renderPortals();renderGovernance();renderCopilot();renderSettings()}nav();show('dashboard');</script></body></html>
